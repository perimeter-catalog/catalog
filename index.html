<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automated Perimeter Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eef1f5;
  --bg2: #f6f8fb;
  --bg3: #e4e9f0;
  --bg4: #dce2eb;
  --border: #d0d7e2;
  --border2: #b8c2d0;
  --text: #1a2332;
  --text2: #4a5568;
  --text3: #8694a7;
  --accent: #3a6fa8;
  --accent2: #2d5a8a;
  --accent-soft: rgba(58,111,168,.07);
  --green: #2d8a5e;
  --amber: #a07810;
  --red: #c43c3c;
  --radius: 10px;
  --radius-sm: 6px;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.55; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Header ── */
.site-header { 
  padding: 20px 28px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  background: var(--bg2); position: sticky; top: 0; z-index: 100;
}
.site-title { font-size: 15px; font-weight: 600; letter-spacing: .06em; color: var(--text2); cursor: pointer; user-select: none; transition: color .15s ease; }
.site-title:hover { color: var(--text); }
.site-title:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 2px; }
.site-title span { color: var(--accent); }
.header-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); }

/* ── Breadcrumb ── */
.breadcrumb { 
  padding: 10px 28px; font-size: 13px; color: var(--text3);
  border-bottom: 1px solid var(--border); background: var(--bg);
  font-family: var(--mono); display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.breadcrumb a { color: var(--text2); }
.breadcrumb a:hover { color: var(--accent); text-decoration: none; }
.breadcrumb .sep { color: var(--text3); opacity: .5; }

/* ── Container ── */
.container { max-width: 1200px; margin: 0 auto; padding: 24px 28px 60px; }

/* ── Loading ── */
.loading { text-align: center; padding: 80px 20px; }
.loading .spinner { 
  width: 32px; height: 32px; border: 3px solid var(--border2);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); }}
.loading p { color: var(--text3); font-size: 14px; }

/* ── Sort controls ── */
.sort-bar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.sort-bar label { font-size: 12px; color: var(--text3); font-family: var(--mono); letter-spacing: .05em; }
.sort-btn {
  font-size: 12px; font-family: var(--mono); padding: 5px 14px;
  border: 1px solid var(--border2); border-radius: 20px;
  background: transparent; color: var(--text2); cursor: pointer;
  transition: all .15s;
}
.sort-btn:hover { border-color: var(--accent); color: var(--accent); }
.sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.record-count { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-left: auto; }

/* ── Form Factor filter pulldown ── */
.ff-filter-group { display: flex; align-items: center; gap: 8px; }
.ff-filter-group label { font-size: 12px; color: var(--text3); font-family: var(--mono); letter-spacing: .05em; }
.ff-filter {
  font-size: 12px; font-family: var(--mono); padding: 5px 28px 5px 12px;
  border: 1px solid var(--border2); border-radius: 20px;
  background: transparent; color: var(--text2); cursor: pointer;
  transition: all .15s;
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6' fill='none' stroke='%238694a7' stroke-width='1.5'><path d='M1 1 L5 5 L9 1'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 8px;
}
.ff-filter:hover { border-color: var(--accent); color: var(--accent); }
.ff-filter:focus { outline: none; border-color: var(--accent); }
.ff-filter.active { background-color: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.sort-bar-divider { width: 1px; align-self: stretch; background: var(--border); margin: 2px 4px; }

/* ── Product Cards (Level 0) ── */
.product-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}
.product-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  cursor: pointer; transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  display: flex; flex-direction: column;
  position: relative;
}
.product-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 70%);
  opacity: 0; transition: opacity .2s ease;
}
.product-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px -8px rgba(0,0,0,.18);
}
.product-card:hover::before { opacity: 1; }

.product-head {
  padding: 14px 16px 10px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
}
.product-head-left { flex: 1; min-width: 0; }
.product-name {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin-bottom: 5px; letter-spacing: -.005em; line-height: 1.3;
}
.product-meta-row {
  font-size: 11px; color: var(--text3);
  font-family: var(--mono);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.product-flag-inline { display: inline-flex; align-items: center; gap: 5px; color: var(--text2); }
.product-flag-inline img { width: 16px; height: auto; border-radius: 1px; display: block; box-shadow: 0 0 0 1px rgba(0,0,0,.06); }
.product-year-badge {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 3px 8px; border-radius: 3px;
  background: var(--accent-soft); color: var(--accent);
  letter-spacing: .03em; white-space: nowrap; flex-shrink: 0;
}

.product-thumbs {
  padding: 4px 16px 12px;
  display: flex; gap: 6px; align-items: center;
  min-height: 40px;
}
.product-thumb {
  width: 38px; height: 38px; flex-shrink: 0;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; object-fit: contain; padding: 3px;
  transition: border-color .15s ease;
}
.product-card:hover .product-thumb { border-color: var(--border-soft, var(--border)); }
.product-thumbs-more {
  font-family: var(--mono); font-size: 10px; letter-spacing: .04em;
  color: var(--text3); flex-shrink: 0;
  padding: 0 4px 0 2px;
}
.product-thumb-placeholder {
  width: 38px; height: 38px; flex-shrink: 0;
  background: var(--bg); border: 1px dashed var(--border);
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  color: var(--text3); opacity: .5;
}

.product-footer {
  padding: 9px 16px 11px;
  border-top: 1px solid var(--border);
  font-size: 11px; font-family: var(--mono);
  display: flex; justify-content: space-between; align-items: center;
  letter-spacing: .03em;
}
.product-count { color: var(--text2); }
.product-type-tag {
  font-size: 10px; padding: 2px 7px; border-radius: 2px;
  background: var(--bg3); color: var(--text2);
  letter-spacing: .05em; text-transform: uppercase;
}

/* ── Model List (Level 1) ── */
.model-list { display: flex; flex-direction: column; gap: 8px; }
.model-row {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px;
  cursor: pointer; transition: all .15s;
  display: grid; grid-template-columns: auto 48px 1fr auto; gap: 14px; align-items: center;
}
.model-row:hover { border-color: var(--accent); background: var(--bg3); }
.model-so { font-family: var(--mono); font-size: 12px; color: var(--text3); min-width: 32px; text-align: right; }
.model-thumb { width: 48px; height: 36px; object-fit: contain; border-radius: 4px; background: var(--bg); display: block; }
.model-thumb-empty { width: 48px; height: 36px; border-radius: 4px; background: var(--bg3); display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 16px; }
.model-name { font-size: 14px; font-weight: 500; }
.model-year { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.model-mfr { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── Model Detail (Level 2) ── */
.detail-header { margin-bottom: 24px; }
.detail-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.detail-sub { font-size: 13px; color: var(--text2); }
.detail-sub span { margin-right: 16px; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }

.detail-section {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.detail-section.full-width { grid-column: 1 / -1; }
.section-head {
  padding: 12px 16px; font-size: 12px; font-weight: 600;
  letter-spacing: .08em; color: var(--text2);
  border-bottom: 1px solid var(--border); background: var(--bg3);
  cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  user-select: none;
}
.section-head .chevron { transition: transform .2s; font-size: 14px; }
.section-head.open .chevron { transform: rotate(180deg); }
.section-body { padding: 14px 16px; }
.section-body.collapsed { display: none; }

.spec-row { 
  display: flex; gap: 8px; padding: 5px 0; 
  border-bottom: 1px solid var(--border); font-size: 13px;
}
.spec-row:last-child { border-bottom: none; }
.spec-label { color: var(--text3); min-width: 140px; flex-shrink: 0; font-family: var(--mono); font-size: 11px; }
.spec-value { color: var(--text); word-break: break-word; white-space: pre-wrap; }

/* ── Image gallery ── */
.image-gallery { display: flex; gap: 8px; flex-wrap: wrap; }
.image-gallery figure {
  margin: 0; max-width: 200px; text-align: center;
}
.image-gallery img { 
  max-width: 200px; max-height: 200px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); cursor: pointer; transition: transform .15s;
  object-fit: contain; background: var(--bg);
}
.image-gallery img:hover { transform: scale(1.03); border-color: var(--accent); }
.image-gallery figcaption {
  font-size: 11px; color: var(--muted); margin-top: 4px;
  line-height: 1.3; word-break: break-word;
}

/* ── Lightbox ── */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,.92);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.lightbox.open { opacity: 1; pointer-events: auto; }
.lightbox img { max-width: 92vw; max-height: 92vh; border-radius: var(--radius); object-fit: contain; }
.lightbox-close {
  position: absolute; top: 16px; right: 20px; font-size: 28px;
  color: #fff; cursor: pointer; opacity: .7;
}
.lightbox-close:hover { opacity: 1; }

/* ── Strategies ── */
.strategies-block { font-size: 13px; white-space: pre-wrap; font-family: var(--mono); line-height: 1.6; }
.strategies-block .section-label { color: var(--accent); font-weight: 600; }

/* ── References ── */
.references-block { font-size: 12px; color: var(--text2); white-space: pre-wrap; line-height: 1.7; font-family: var(--mono); }
.references-block a { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent); word-break: break-all; }
.references-block a:hover { text-decoration: none; border-bottom-style: solid; color: var(--accent2); }

/* ── Pattern grid ── */
.pattern-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.pattern-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px;
  cursor: pointer; transition: all .15s; text-align: center;
  display: flex; flex-direction: column;
}
.pattern-card:hover { border-color: var(--accent); background: var(--bg4); }
.pattern-card .pname {
  font-size: 13px; font-weight: 500; margin-bottom: 4px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; line-height: 1.3; min-height: 2.6em;
}
.pattern-card .pcat { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.pattern-card .pcount { font-size: 11px; color: var(--text2); margin-top: 4px; }
.pattern-card img {
  max-width: 100%; max-height: 120px; border-radius: 4px;
  margin-top: 8px; margin-left: auto; margin-right: auto;
  object-fit: contain; display: block;
}
.pattern-card .pattern-thumb-svg {
  width: 120px; height: 120px; margin: 8px auto 0;
  border-radius: 4px; background: #fff; border: 1px solid var(--border);
}
.pattern-card .pattern-thumb-svg svg { width: 100%; height: 100%; display: block; }

/* ── Pattern Detail (Level 3) ── */
.pattern-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 768px) { .pattern-detail-grid { grid-template-columns: 1fr; } }
.pattern-image-wrap { text-align: center; }
.pattern-image-wrap img { max-width: 100%; max-height: 400px; border-radius: var(--radius); border: 1px solid var(--border); }
.coord-table { font-family: var(--mono); font-size: 11px; max-height: 300px; overflow-y: auto; }
.coord-table table { width: 100%; border-collapse: collapse; }
.coord-table th, .coord-table td { padding: 3px 8px; border-bottom: 1px solid var(--border); text-align: right; }
.coord-table th { color: var(--text3); position: sticky; top: 0; background: var(--bg2); }

/* ── Strategies Available (on Pattern Detail) ── */
.strategies-available { margin: 24px 0 16px; padding: 14px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
.strategies-available h3 { font-size: 12px; color: var(--text3); font-family: var(--mono); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 10px; font-weight: 500; }
.strategies-available h3 .sa-device { color: var(--text2); text-transform: none; letter-spacing: 0; font-family: var(--font); font-weight: 500; }
.strategy-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.strategy-chip {
  display: inline-flex; align-items: baseline; gap: 6px;
  padding: 4px 10px; border: 1px solid var(--border2); border-radius: 14px;
  background: var(--bg); font-size: 12px; color: var(--text2);
}
.strategy-chip code { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 500; background: var(--accent-soft); padding: 1px 6px; border-radius: 3px; }
.strategies-available .sa-empty { font-size: 12px; color: var(--text3); font-style: italic; }

/* ── Also Available On (linked devices for a Pattern Figure) ── */
.pf-devices { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px; }
.pf-device-link {
  display: flex; flex-direction: column; gap: 2px;
  padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 12px; line-height: 1.4; color: var(--text); text-decoration: none;
  transition: border-color .12s, background .12s;
}
.pf-device-link:hover { border-color: var(--accent); background: var(--bg4); text-decoration: none; }
.pf-device-link.current { border-color: var(--accent); background: var(--accent-soft); cursor: default; }
.pf-device-link.current:hover { border-color: var(--accent); background: var(--accent-soft); }
.pf-device-link .pd-model { font-weight: 500; color: var(--text); }
.pf-device-link .pd-meta { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.pf-device-link .pd-current-tag { font-size: 9px; color: var(--accent); letter-spacing: .07em; font-family: var(--mono); text-transform: uppercase; margin-top: 1px; }
.pf-devices-summary { font-size: 12px; color: var(--text3); margin-bottom: 10px; font-family: var(--mono); }

/* ── Reliability ── */
.reliability-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .reliability-grid { grid-template-columns: 1fr; } }
.rel-item { background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 12px; }
.rel-item .rel-label { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; }
.rel-item .rel-value { font-size: 13px; color: var(--text); white-space: pre-wrap; }

/* ── Special Comments ── */
.comments-block { font-size: 13px; white-space: pre-wrap; line-height: 1.7; color: var(--text2); }

/* ── Back button ── */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text2); margin-bottom: 16px;
  cursor: pointer; padding: 4px 0;
}
.back-btn:hover { color: var(--accent); }

/* ── Responsive ── */
@media (max-width: 600px) {
  .site-header { padding: 14px 16px; }
  .container { padding: 16px 16px 40px; }
  .breadcrumb { padding: 8px 16px; }
  .product-grid { grid-template-columns: 1fr; }
  .detail-title { font-size: 18px; }
}
</style>
</head>

async function fetchAllMain() {
  const fields = [
    F.model, F.productName, F.groupSort, F.sortOrder, F.manufacturer, F.type, F.formFactor,
    F.releaseYear, F.country, F.flag, F.displayName, F.specialComments, F.references,
    F.stimType, F.stimLum, F.stimSizes, F.stimDuration, F.stimColors, F.stimInterval, F.stimNumber, F.stimSummary,
    F.bgType, F.bgSummary, F.bgLum, F.bgSize, F.bgColor,
    F.fixType, F.fixNote, F.fixMonitor,
    F.strategies, F.patterns, F.patternsLinked,
    F.peripheralRange, F.measDist,
    F.analysis, F.platformNotes,
    F.width, F.depth, F.height, F.weight, F.dims,
    F.fpDetection, F.fnDetection, F.retestMethod, F.reliabilityNote,
    F.mfrUrl, F.image,
  ];
  let all = [], offset = null;
  do {
    let url = `https://api.airtable.com/v0/${BASE_ID}/${MAIN_TABLE}?pageSize=100&returnFieldsByFieldId=true`;
    fields.forEach(f => url += `&fields%5B%5D=${f}`);
    url += `&sort%5B0%5D%5Bfield%5D=${F.sortOrder}&sort%5B0%5D%5Bdirection%5D=asc`;
    if (offset) url += `&offset=${offset}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
    if (!res.ok) throw new Error(`Airtable ${res.status}`);
    const data = await res.json();
    all.push(...data.records);
    offset = data.offset;
  } while (offset);
  return all;
}

async function fetchPFForModel(recId) {
  if (pfCache[recId]) return pfCache[recId];
  
  // Get linked PF record IDs from main record
  const mainRec = allRecords.find(r => r.id === recId);
  if (!mainRec) return [];
  const linked = mainRec.fields?.[F.patternsLinked];
  if (!linked || !linked.length) return [];
  
  const pfIds = linked.map(l => typeof l === 'object' ? l.id : l).filter(Boolean);
  if (!pfIds.length) return [];
  
  const fields = [PF.name, PF.patternId, PF.so, PF.deviceLink, PF.pointCount, 
    PF.description, PF.category, PF.measMode, PF.eyeVariant, PF.uncertaintyNotes,
    PF.coordsOD, PF.coordsOS, PF.coordsOdPolar, PF.coordsOsPolar,
    PF.osMirror, PF.imageOD, PF.imageOS];
  
  let allPF = [];
  // Batch in groups of 20 to keep URL length manageable
  for (let i = 0; i < pfIds.length; i += 20) {
    const batch = pfIds.slice(i, i + 20);
    const formula = `OR(${batch.map(b => `RECORD_ID()='${b}'`).join(',')})`;
    let url = `https://api.airtable.com/v0/${BASE_ID}/${PF_TABLE}?returnFieldsByFieldId=true&pageSize=100`;
    fields.forEach(f => url += `&fields%5B%5D=${f}`);
    url += `&filterByFormula=${encodeURIComponent(formula)}`;
    try {
      const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
      if (res.ok) {
        const data = await res.json();
        allPF.push(...(data.records || []));
      }
    } catch(e) { console.error('PF fetch error:', e); }
  }
  // Sort by PatternsLinked array order (preserves Test Patterns listing order)
  const idOrder = new Map(pfIds.map((id, i) => [id, i]));
  allPF.sort((a, b) => (idOrder.get(a.id) ?? 999) - (idOrder.get(b.id) ?? 999));
  pfCache[recId] = allPF;
  return allPF;
}

function g(rec, fid) { return rec.fields?.[fid] ?? ''; }
function gn(rec, fid) { return rec.fields?.[fid] ?? null; }
function sel(v) { 
  if (!v) return '';
  if (Array.isArray(v)) return v.map(x => typeof x === 'object' ? x.name : x).join(', ');
  return typeof v === 'object' ? v.name : v;
}
function multiSel(v) {
  if (!v) return '';
  if (Array.isArray(v)) return v.map(x => typeof x === 'object' ? x.name : x).join(', ');
  return typeof v === 'object' ? v.name : String(v);
}
function esc(s) { 
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML; 
}

// ── Strict-format parsers (Test Patterns + Test Strategies [Abbreviations]) ──
// Parses Main.Test Patterns text into { patternId -> [abbrev, ...] }.
// Accepted line format: "{Pattern ID}: {abbrev1}, {abbrev2}, ..."
// Lines that do not match are ignored (e.g. section headers, narrative notes,
// "See linked Pattern Figures.", 📌 flags).
function parseTestPatterns(text) {
  const map = {};
  if (!text || typeof text !== 'string') return map;
  text.split(/\r?\n/).forEach(rawLine => {
    const line = rawLine.trim();
    if (!line) return;
    // Skip structural lines
    if (line.startsWith('[')) return;
    if (line.startsWith('See ')) return;
    if (line.startsWith('📌') || line.startsWith('\u{1F4CC}')) return;
    if (line.startsWith('•') || line.startsWith('–') || line.startsWith('-')) return;
    const colon = line.indexOf(':');
    if (colon < 1) return;
    const pid = line.slice(0, colon).trim();
    // Pattern ID validity: skip obviously-non-PID prose like "Note: ..." or "NB: ..."
    if (pid.length > 40) return;
    const rest = line.slice(colon + 1).trim();
    if (!rest) return;
    const strategies = rest.split(',').map(s => s.trim()).filter(Boolean);
    if (strategies.length) map[pid] = strategies;
  });
  return map;
}

// Parses Main.Test Strategies [Abbreviations] section into { abbrev -> fullName }.
function parseAbbreviations(text) {
  const map = {};
  if (!text || typeof text !== 'string') return map;
  let inAbbrev = false;
  text.split(/\r?\n/).forEach(rawLine => {
    const line = rawLine.trim();
    if (/^\[\s*Abbreviations\s*\]/i.test(line)) { inAbbrev = true; return; }
    if (inAbbrev && /^\[/.test(line)) { inAbbrev = false; return; }
    if (!inAbbrev || !line) return;
    const m = line.match(/^([A-Za-z0-9_+\-]+)\s*=\s*(.+)$/);
    if (m) map[m[1].trim()] = m[2].trim();
  });
  return map;
}
// Auto-linkify PMID / PMC / DOI / plain URLs inside already-HTML-escaped text.
// Input MUST come from esc() or equivalent (no untrusted HTML).
function linkifyRefs(escapedText) {
  const PM_URL  = 'https://pubmed.ncbi.nlm.nih.gov/';
  const PMC_URL = 'https://www.ncbi.nlm.nih.gov/pmc/articles/';
  const DOI_URL = 'https://doi.org/';
  const A = (href, label) => `<a href="${href}" target="_blank" rel="noopener noreferrer">${label}</a>`;

  let t = escapedText;

  // 1) PMID: 12345678  /  PMID:12345678  /  PMID 12345678
  t = t.replace(/\bPMID[:：]?\s*(\d{5,9})\b/gi,
    (match, id) => A(`${PM_URL}${id}/`, match));

  // 2) PMC1234567
  t = t.replace(/\bPMC(\d{4,9})\b/g,
    (match) => A(`${PMC_URL}${match}/`, match));

  // 3) doi: 10.xxxx/yyy  (preserve original "doi:" / "DOI:" prefix; trim trailing punctuation from DOI)
  t = t.replace(/\b(doi[:：]\s*)(10\.\d{4,9}\/[^\s<>"()\[\]]+)/gi,
    (match, prefix, doi) => {
      const clean = doi.replace(/[.,;:]+$/, '');
      const trailing = doi.slice(clean.length);
      return `${prefix}${A(`${DOI_URL}${clean}`, clean)}${trailing}`;
    });

  // 4) Plain URLs — avoid re-linkifying URLs inside anchors added above.
  //    Split around existing <a>...</a> tags; only linkify in the text segments.
  const parts = [];
  let last = 0;
  const anchorRe = /<a\s[^>]*>[\s\S]*?<\/a>/g;
  let m;
  while ((m = anchorRe.exec(t)) !== null) {
    parts.push(t.slice(last, m.index));
    parts.push(m[0]);
    last = m.index + m[0].length;
  }
  parts.push(t.slice(last));
  const urlRe = /(https?:\/\/[^\s<>"()]+)/g;
  return parts.map((p, i) => {
    if (i % 2 === 1) return p; // existing anchor, skip
    return p.replace(urlRe, (url) => {
      const clean = url.replace(/[.,;:!?]+$/, '');
      const trailing = url.slice(clean.length);
      return `${A(clean, clean)}${trailing}`;
    });
  }).join('');
}
function flagImg(rec) {
  const flagArr = rec.fields?.[F.flag];
  if (!flagArr || !flagArr.length) return '';
  return flagArr[0].url || flagArr[0].thumbnails?.small?.url || '';
}
function countryName(rec) {
  const c = rec.fields?.[F.country];
  return c ? (typeof c === 'object' ? c.name : c) : '';
}
// Collect distinct {name, flag} entries across a record list, preserving the
// order of first appearance (records are SO-sorted, so earliest-dated country
// comes first). Needed for product groups whose records span multiple countries
// — e.g. Competer (Sweden origin, then USA distribution) — where showing only
// the first record's flag would hide the other countries entirely.
function collectCountries(records) {
  const seen = new Set();
  const out = [];
  for (const r of records) {
    const name = countryName(r);
    if (!name || seen.has(name)) continue;
    seen.add(name);
    out.push({ name, flag: flagImg(r) });
  }
  return out;
}
function extractYear(s) {
  if (!s) return 9999;
  const m = String(s).match(/(\d{4})/);
  return m ? parseInt(m[1]) : 9999;
}
function groupProducts(records) {
  const groups = {};
  records.forEach(r => {
    const pn = g(r, F.productName) || g(r, F.model) || '(Unknown)';
    if (!groups[pn]) groups[pn] = [];
    groups[pn].push(r);
  });
  return groups;
}

let lbHistoryPushed = false;

function openLightbox(src) {
  const lb = document.getElementById('lightbox');

  if (lbPreloader) lbPreloader.onload = null;
  img.src = BLANK_GIF;
  lb.classList.add('open');
  lbHistoryPushed = true;
  history.pushState({ lightbox: true }, '');
  lbPreloader = new Image();
  lbPreloader.onload = () => {
    if (lb.classList.contains('open')) img.src = src;
  };

}
function closeLightbox(fromPopstate) {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (lbPreloader) { lbPreloader.onload = null; lbPreloader = null; }
  lb.classList.remove('open');
  document.getElementById('lightboxImg').src = BLANK_GIF;
  if (!fromPopstate && lbHistoryPushed) {
    lbHistoryPushed = false;
    history.back();
  } else {
    lbHistoryPushed = false;
  }
}

// ── Level 0: Product List ──
function productCardHtml(p) {
  const countries = collectCountries(p.records);
  const types = [...new Set(p.records.map(r => sel(r.fields?.[F.type])).filter(Boolean))];
  const yearStr = p.year < 9999 ? p.year : '?';

  // Collect thumbs from records in group (records[0] is lowest SO → oldest first)
  const thumbs = [];
  for (const r of p.records) {
    const imgs = r.fields?.[F.image];
    if (imgs && imgs.length) {
      const src = imgs[0].thumbnails?.small?.url || imgs[0].url;
      if (src) thumbs.push({ src, name: g(r, F.model) || '' });
    }
  }
  const MAX_THUMBS = 6;
  const visible = thumbs.slice(0, MAX_THUMBS);
  const overflow = thumbs.length - visible.length;

  const flagsHtml = countries.map(c => `
    <span class="product-flag-inline">
      ${c.flag ? `<img src="${c.flag}" alt="${esc(c.name)}">` : ''}
      <span>${esc(c.name)}</span>
    </span>
  `).join('');

  const thumbsHtml = visible.length
    ? visible.map(t => `<img class="product-thumb" src="${t.src}" alt="${esc(t.name)}" title="${esc(t.name)}" loading="lazy">`).join('')
      + (overflow > 0 ? `<span class="product-thumbs-more">+${overflow}</span>` : '')
    : `<div class="product-thumb-placeholder" title="No images yet">
         <svg viewBox="0 0 38 38" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
           <path d="M7 28 Q7 10 19 8 Q31 10 31 28" fill="none" stroke="currentColor" stroke-width="1.5"/>
           <circle cx="19" cy="24" r="1.6" fill="currentColor"/>
           <line x1="19" y1="15" x2="19" y2="22" stroke="currentColor" stroke-width="1.2"/>
         </svg>
       </div>`;

  return `
    <div class="product-card" onclick="location.hash='#product/${encodeURIComponent(p.name)}'">
      <div class="product-head">
        <div class="product-head-left">
          <div class="product-name">${esc(p.name)}</div>
          <div class="product-meta-row">${flagsHtml}</div>
        </div>
        <div class="product-year-badge">${yearStr}</div>
      </div>
      <div class="product-thumbs">${thumbsHtml}</div>
      <div class="product-footer">
        <span class="product-count">${p.records.length} model${p.records.length>1?'s':''}</span>
        ${types[0] ? `<span class="product-type-tag">${esc(types[0])}</span>` : ''}
      </div>
    </div>
  `;
}

function renderProducts() {
  const groups = groupProducts(allRecords);
  const productList = Object.entries(groups).map(([name, records]) => {
    const first = records[0];
    const gs = g(first, F.groupSort);
    const yr = extractYear(gs);
    // Distinct Form Factors and Countries across the group's records.
    // A product that spans multiple buckets will appear once in each matching
    // filter (per catalog design — e.g. imo series spans Table Top + HMD/VR,
    // Competer spans Sweden + USA).
    const formFactors = [...new Set(records.map(r => sel(r.fields?.[F.formFactor])).filter(Boolean))];
    const countries = [...new Set(records.map(r => countryName(r)).filter(Boolean))];
    return { name, records, year: yr, first, formFactors, countries };
  });

  // Baseline ordering applies to the full product list first so dropdown
  // labels can reflect totals before filters are applied.
  if (sortMode === 'name') productList.sort((a,b) => a.name.localeCompare(b.name));
  else productList.sort((a,b) => a.year - b.year);

  // ── Faceted filter matchers (reused by counts and by visibility). ──
  const matchFF = (p, ff) => ff === 'all' || (p.formFactors.length === 0 ? ff === 'Other' : p.formFactors.includes(ff));
  const matchCountry = (p, c) => c === 'all' || p.countries.includes(c);

  // Per-bucket counts are computed against the *other* filter's current
  // state so each dropdown's count reflects "what I'd see if I picked this
  // on top of my current selection" — standard faceted-search behaviour.
  const afterCountryOnly = productList.filter(p => matchCountry(p, countryFilter));
  const afterFFOnly = productList.filter(p => matchFF(p, formFactorFilter));

  // Form Factor counts (among products that already pass the country filter).
  const ffCounts = {};
  FORM_FACTOR_ORDER.forEach(ff => {
    ffCounts[ff] = afterCountryOnly.filter(p => matchFF(p, ff)).length;
  });

  // Country counts (among products that already pass the Form Factor filter).
  // Country options come from the data itself — no fixed order. Sort by count
  // descending, then by name ascending as tiebreaker.
  const countryCounts = {};
  afterFFOnly.forEach(p => p.countries.forEach(c => { countryCounts[c] = (countryCounts[c] || 0) + 1; }));
  const countryOptions = Object.keys(countryCounts).sort((a, b) =>
    countryCounts[b] - countryCounts[a] || a.localeCompare(b)
  );

  // Visible list after both filters.
  const visibleList = productList.filter(p => matchFF(p, formFactorFilter) && matchCountry(p, countryFilter));

  setBreadcrumb([{ label: 'Catalog', hash: '#' }]);
  const metaEl = document.getElementById('headerMeta');
  metaEl.textContent = `${allRecords.length} models · ${productList.length} products`;
  // Append last-updated timestamp from the catalog repo's latest commit.
  // Uses GitHub's public API (no auth needed for public repos). The data is
  // cached by the browser for ~60s. If the fetch fails (offline, rate limit)
  // we silently leave the original counts-only header in place.
  fetch('https://api.github.com/repos/perimeter-catalog/catalog/commits/main')
    .then(r => r.ok ? r.json() : null)
    .then(j => {
      if (!j || !j.commit || !j.commit.committer) return;
      const iso = j.commit.committer.date;
      const d = new Date(iso);
      // "2026-04-25 21:15 JST" style: always display in user's local zone
      const pad = n => String(n).padStart(2, '0');
      const stamp = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      metaEl.textContent = `${allRecords.length} models · ${productList.length} products · updated ${stamp}`;
    })
    .catch(() => {});

  const ffOptionsHtml = [`<option value="all">All form factors (${afterCountryOnly.length})</option>`]
    .concat(FORM_FACTOR_ORDER
      .filter(ff => ffCounts[ff] > 0)
      .map(ff => `<option value="${esc(ff)}"${ff===formFactorFilter?' selected':''}>${esc(ff)} (${ffCounts[ff]})</option>`))
    .join('');

  const countryOptionsHtml = [`<option value="all">All countries (${afterFFOnly.length})</option>`]
    .concat(countryOptions
      .map(c => `<option value="${esc(c)}"${c===countryFilter?' selected':''}>${esc(c)} (${countryCounts[c]})</option>`))
    .join('');

  const ffActive = formFactorFilter !== 'all';
  const countryActive = countryFilter !== 'all';
  const anyActive = ffActive || countryActive;
  const countLabel = anyActive
    ? `${visibleList.length} of ${productList.length} products`
    : `${productList.length} products`;

  let html = `
    <div class="sort-bar">
      <div class="ff-filter-group">
        <label>FORM FACTOR</label>
        <select class="ff-filter ${ffActive?'active':''}" onchange="formFactorFilter=this.value;renderProducts()">
          ${ffOptionsHtml}
        </select>
      </div>
      <div class="ff-filter-group">
        <label>COUNTRY</label>
        <select class="ff-filter ${countryActive?'active':''}" onchange="countryFilter=this.value;renderProducts()">
          ${countryOptionsHtml}
        </select>
      </div>
      <div class="sort-bar-divider"></div>
      <label>SORT BY</label>
      <button class="sort-btn ${sortMode==='year'?'active':''}" onclick="sortMode='year';renderProducts()">Release Year</button>
      <button class="sort-btn ${sortMode==='name'?'active':''}" onclick="sortMode='name';renderProducts()">Name A-Z</button>
      <span class="record-count">${countLabel}</span>
    </div>
    <div class="product-grid">${visibleList.map(productCardHtml).join('')}</div>
  `;

  $app.innerHTML = html;
}

// ── Level 1: Product Detail (Model List) ──

}

    if (!filename) return '';

  }

// ── SVG pattern renderer (from Airtable coord JSON) ──
// Renders eccentricity rings + axes + test points as inline SVG.
// Accepts cartesian [{x,y,type?,count?}] or polar [{r,theta,type?,count?}].
// Auto-fits the viewport extent based on the actual point spread so that
// a central pattern like 24-2 doesn't appear tiny inside a full-field frame.
// If mirror=true, x is negated (for OS when osMirror checkbox is set and OS
// coords are taken from OD).
// If compact=true, axis labels are dropped and styling thinned — used for
// small thumbnails on the device page.
function renderPatternSVG(coords, opts) {
  const { isPolar = false, mirror = false, label = '', compact = false } = opts || {};
  // Convert coords to (x,y) in visual-field convention (y up = positive)
  const pts = (coords || []).map(c => {
    let x, y;
    if (isPolar) {
      const rad = (Number(c.theta) * Math.PI) / 180;
      x = Number(c.r) * Math.cos(rad);
      y = Number(c.r) * Math.sin(rad);
    } else {
      x = Number(c.x);
      y = Number(c.y);
    }
    if (mirror) x = -x;
    return { x, y, type: c.type, count: c.count };
  }).filter(p => Number.isFinite(p.x) && Number.isFinite(p.y));

  // Auto-fit extent: round maxR up to the next 10° boundary, then add a
  // full decade of margin so that a 24-2 pattern (points out to ~28°)
  // shows its 30° ring with comfortable periphery instead of being pinned
  // to the frame edge. Small patterns use a half-decade margin to avoid
  // oversized blank space.
  const maxR = pts.length ? Math.max(...pts.map(p => Math.hypot(p.x, p.y))) : 60;
  const decadeMax = Math.max(10, Math.ceil(maxR / 10) * 10);
  const EXTENT = decadeMax <= 20 ? decadeMax + 5 : decadeMax + 10;
  // Ring labels: 5° ring only for very small patterns; then every 10° up
  // to the decade that covers maxR.
  const rings = [];
  if (EXTENT <= 15) rings.push(5);
  for (let r = 10; r <= decadeMax; r += 10) rings.push(r);
  if (!rings.length) rings.push(5);

  // Stroke widths: compact thumbnails (~120px display) need a stroke
  // floor so concentric-circle rings don't vanish into sub-pixel range.
  // At 120px display, 0.5px ≈ EXTENT/120 viewBox units.
  const stroke = compact
    ? Math.max(EXTENT * 0.004, EXTENT / 100).toFixed(3)
    : (EXTENT * 0.004).toFixed(3);
  // Point radius: uniform 2.2% of extent in compact (no floor → 10-2 and
  // 24-2 render at the same visual size), 1.2% in full-size.
  const pointR = compact
    ? (EXTENT * 0.022).toFixed(2)
    : (EXTENT * 0.012).toFixed(2);
  const fontSize = (EXTENT * 0.05).toFixed(2);

  const ringsSvg = rings.map(r =>
    `<circle cx="0" cy="0" r="${r}" fill="none" stroke="#c8d0dc" stroke-width="${stroke}"/>`
  ).join('');
  const axesSvg =
    `<line x1="${-EXTENT}" y1="0" x2="${EXTENT}" y2="0" stroke="#c8d0dc" stroke-width="${stroke}"/>` +
    `<line x1="0" y1="${-EXTENT}" x2="0" y2="${EXTENT}" stroke="#c8d0dc" stroke-width="${stroke}"/>`;
  const labelsSvg = compact ? '' : rings.map(r =>
    `<text x="${r + EXTENT * 0.015}" y="${-EXTENT * 0.01}" font-size="${fontSize}" fill="#8694a7" font-family="DM Sans,sans-serif">${r}°</text>`
  ).join('');
  const pointsSvg = pts.map(p => {
    const cx = p.x, cy = -p.y; // flip y for SVG
    if (p.type === 'blind_spot') {
      // Black filled triangle (pointing up) — conventional perimeter
      // chart notation for the physiologic blind spot. Sized relative
      // to pointR (1.6×) so it scales with compact vs full rendering.
      const s = Number(pointR) * 1.6;
      const topY = cy - s * 1.15;
      const botY = cy + s * 0.58;
      return `<polygon points="${cx},${topY} ${cx - s},${botY} ${cx + s},${botY}" fill="#1a2332"/>`;
    }
    if (p.type === 'fixation') {
      const m = (EXTENT * 0.02).toFixed(2);
      return `<path d="M${cx - m},${cy} L${cx + +m},${cy} M${cx},${cy - m} L${cx},${cy + +m}" stroke="#c43c3c" stroke-width="${stroke}"/>`;
    }
    // Concentric-circle notation for repeated-test points:
    //   count=1 → single filled dot
    //   count=2 → small filled dot + 1 outer ring  (⊙)
    //   count=3 → small filled dot + 2 outer rings (⊚)
    // The inner dot shrinks and the outer rings scale up relative to
    // pointR so the triple-ring structure reads as distinct rings, not
    // a single thick blob.
    const count = Math.max(1, Number(p.count) || 1);
    if (count === 1) {
      return `<circle cx="${cx}" cy="${cy}" r="${pointR}" fill="#1a2332"/>`;
    }
    const pr = Number(pointR);
    const innerR = (pr * 0.55).toFixed(2);
    // Ring stroke: scaled to pointR, with a compact-mode floor so rings
    // remain visible at ~120px thumbnail display. ~0.8px at 120px.
    const ringStroke = compact
      ? Math.max(pr * 0.35, EXTENT / 75).toFixed(3)
      : (pr * 0.28).toFixed(3);
    // Ring positions: spread generously to give clear gaps between rings.
    // Compact widens the spread further because strokes are proportionally
    // thicker at thumbnail size.
    const spreadBase = compact ? 1.3 : 1.05;
    const spreadStep = compact ? 0.80 : 0.75;
    let svg = `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="#1a2332"/>`;
    for (let i = 1; i < count; i++) {
      const rOut = (pr * (spreadBase + (i - 1) * spreadStep)).toFixed(2);
      svg += `<circle cx="${cx}" cy="${cy}" r="${rOut}" fill="none" stroke="#1a2332" stroke-width="${ringStroke}"/>`;
    }
    return svg;
  }).join('');
  const title = label ? `<title>${label}</title>` : '';
  const style = compact
    ? 'width:100%;height:100%;display:block'
    : 'width:100%;max-width:400px;max-height:400px;border-radius:var(--radius);border:1px solid var(--border);background:#fff';
  return `<svg viewBox="${-EXTENT} ${-EXTENT} ${EXTENT * 2} ${EXTENT * 2}" xmlns="http://www.w3.org/2000/svg" style="${style}">${title}${ringsSvg}${axesSvg}${labelsSvg}${pointsSvg}</svg>`;
}

// ── Left-right symmetry detector ──
// Returns true if every point (x,y) has a corresponding point (-x,y) in the
// same set with the same type. Used to decide whether OS should be rendered
// separately when osMirror=true: mirroring a symmetric pattern produces an
// identical figure, so we show a single "OD / OS" panel instead of two
// visually identical ones. Asymmetric patterns (Nasal Step, Temporal
// Crescent, patterns with blind-spot markers at the physiologic position)
// correctly fail this check and still render both eyes.
function isLeftRightSymmetric(coords, isPolar) {
  if (!coords || coords.length === 0) return false;
  // Convert to cartesian so the symmetry check is uniform.
  const pts = coords.map(c => {
    if (isPolar) {
      const rad = (Number(c.theta) * Math.PI) / 180;
      return { x: Number(c.r) * Math.cos(rad), y: Number(c.r) * Math.sin(rad), type: c.type || 'point' };
    }
    return { x: Number(c.x), y: Number(c.y), type: c.type || 'point' };
  });
  const eps = 0.05; // tolerance for float rounding from polar conversion
  return pts.every(p =>
    pts.some(q =>
      q.type === p.type &&
      Math.abs(q.x + p.x) < eps &&  // q.x ≈ -p.x
      Math.abs(q.y - p.y) < eps
    )
  );
}

// ── Level 3: Pattern Detail ──
async function renderPattern(pfId, modelId) {
  const rec = allRecords.find(r => r.id === modelId);
  const productName = rec ? (rec.fields?.[F.productName] || rec.fields?.[F.model] || '') : '';
  const modelName = rec ? (rec.fields?.[F.model] || '') : '';

  // Fetch PF record
  let pfRec = null;
  const cached = pfCache[modelId];
  if (cached) pfRec = cached.find(p => p.id === pfId);
  if (!pfRec) {
    // Fetch directly
    const url = `https://api.airtable.com/v0/${BASE_ID}/${PF_TABLE}/${pfId}?returnFieldsByFieldId=true`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
    if (res.ok) pfRec = await res.json();
  }
  if (!pfRec) { $app.innerHTML = '<p>Pattern not found.</p>'; return; }

  const pf = pfRec.fields || {};
  const patName = pf[PF.name] || '';

  setBreadcrumb([
    { label: 'Catalog', hash: '#' },
    { label: productName, hash: `#product/${encodeURIComponent(productName)}` },
    { label: modelName, hash: `#model/${modelId}` },
    { label: patName, hash: `#pattern/${pfId}/${modelId}` },
  ]);

  const row = (label, val) => val ? `<div class="spec-row"><div class="spec-label">${label}</div><div class="spec-value">${esc(String(val))}</div></div>` : '';

  const imgOD = pf[PF.imageOD];
  const imgOS = pf[PF.imageOS];
  const osMirror = pf[PF.osMirror];
  const coordsRaw = pf[PF.coordsOD];
  const coordsPolarRaw = pf[PF.coordsOdPolar];

  // Parse coordinates — prefer polar if available (for radial patterns)
  let coords = [];
  let isPolar = false;
  if (coordsPolarRaw) {
    try {
      const polar = JSON.parse(coordsPolarRaw);
      if (Array.isArray(polar) && polar.length > 0 && 'r' in polar[0] && 'theta' in polar[0]) {
        isPolar = true;
        coords = polar;
      }
    } catch(e) {}
  }
  if (!isPolar && coordsRaw) {
    try { coords = JSON.parse(coordsRaw); } catch(e) {}
  }

  // ── Parse OS coordinates (explicit coordsOS > mirror of OD > attachment) ──
  const coordsOsRaw = pf[PF.coordsOS];
  const coordsOsPolarRaw = pf[PF.coordsOsPolar];
  let coordsOs = [];
  let osIsPolar = false;
  if (coordsOsPolarRaw) {
    try {
      const p = JSON.parse(coordsOsPolarRaw);
      if (Array.isArray(p) && p.length > 0 && 'r' in p[0] && 'theta' in p[0]) {
        osIsPolar = true;
        coordsOs = p;
      }
    } catch(e) {}
  }
  if (!osIsPolar && coordsOsRaw) {
    try { coordsOs = JSON.parse(coordsOsRaw); } catch(e) {}
  }

  // ── Binocular (OU) detection ──
  // Estermann Binocular and similar tests are measured with both eyes open,
  // so the OD/OS distinction does not apply. We detect this from the PF's
  // Measurement Mode or Eye Variant fields. When binocular, render a single
  // panel labeled "Binocular (OU)" regardless of osMirror / coordsOS state.
  const measModeVal = sel(pf[PF.measMode]);
  const eyeVariantVal = sel(pf[PF.eyeVariant]);
  const isBinocular =
    measModeVal === 'Binocular' ||
    eyeVariantVal === 'Binocular' ||
    eyeVariantVal === 'Binocular/Binocular';

  // ── OS panel decision ──
  // We render a separate OS panel only when the user has supplied explicit
  // OS coordinates (coordsOsRaw / coordsOsPolarRaw) OR an explicit OS image
  // attachment. For binocular tests, for osMirror=true cases (symmetric OR
  // asymmetric), and for patterns without any OS data, we render only the
  // OD panel and adjust the heading label.
  const hasExplicitOsData = coordsOs.length > 0 || (imgOS && imgOS.length);
  const showOsSection = !isBinocular && hasExplicitOsData;

  // OS rendering source (when showOsSection is true)
  const osRenderCoords = coordsOs;
  const osRenderPolar = osIsPolar;
  const osRenderMirror = false; // explicit OS coords are never re-mirrored

  // ── OD heading label ──
  // Four cases:
  //   1. Binocular → "Binocular (OU)"
  //   2. Symmetric pattern with osMirror=true → "OD / OS (left-right symmetric)"
  //   3. Asymmetric pattern with osMirror=true → "OD (OS is mirror image)"
  //   4. Explicit OS data OR no OS info → "OD Pattern"
  let odHeading;
  if (isBinocular) {
    odHeading = 'Binocular (OU)';
  } else if (hasExplicitOsData) {
    odHeading = 'OD Pattern';
  } else if (osMirror && coords.length) {
    odHeading = isLeftRightSymmetric(coords, isPolar)
      ? 'OD / OS (left-right symmetric)'
      : 'OD (OS is mirror image)';
  } else {
    odHeading = 'OD Pattern';
  }

  // ── Strategies available for this pattern on the context device ──
  // Parse the parent device's strict-format Test Patterns + Abbreviations and
  // surface the union of strategies keyed by the PF's Pattern ID.
  const patternIdKey = pf[PF.patternId] || '';
  const patternsMap = rec ? parseTestPatterns(rec.fields?.[F.patterns]) : {};
  const abbrevMap = rec ? parseAbbreviations(rec.fields?.[F.strategies]) : {};
  const strategyCodes = patternsMap[patternIdKey] || [];
  const strategyChipsHtml = strategyCodes.length
    ? strategyCodes.map(code => {
        const full = abbrevMap[code];
        return `<span class="strategy-chip"><code>${esc(code)}</code>${full ? esc(full) : ''}</span>`;
      }).join('')
    : `<span class="sa-empty">No strategies registered for pattern ID "${esc(patternIdKey)}" on this device.</span>`;

  let html = `
    <div class="detail-header">
      <div class="detail-title">${esc(patName)}</div>
      <div class="detail-sub">
        <span>${esc(sel(pf[PF.category]))}</span>
        <span>${pf[PF.pointCount] ? pf[PF.pointCount]+' points' : ''}</span>
        <span>${esc(sel(pf[PF.measMode]))}</span>
        <span>${esc(sel(pf[PF.eyeVariant]))}</span>
      </div>
    </div>
    
    ${pf[PF.description] ? `<p style="color:var(--text2);margin-bottom:16px;font-size:13px">${esc(pf[PF.description])}</p>` : ''}

    <div class="strategies-available">
      <h3>Strategies available on <span class="sa-device">${esc(modelName || '(this device)')}</span></h3>
      <div class="strategy-chips">${strategyChipsHtml}</div>
    </div>

    ${osMirror ? '<p style="color:var(--amber);font-size:12px;font-family:var(--mono);margin-bottom:16px">OS = Mirror of OD (left-right reflected)</p>' : ''}
    
    <div class="pattern-detail-grid">
      <div>
        <h3 style="font-size:14px;color:var(--text2);margin-bottom:8px">${esc(odHeading)}</h3>
        <div class="pattern-image-wrap">
          ${coords.length
            ? renderPatternSVG(coords, { isPolar, mirror: false, label: `${esc(patName)} (OD)` })
            : (imgOD && imgOD.length
                ? `<img src="${imgOD[0].url}" alt="OD" onclick="openLightbox('${imgOD[0].url}')" style="cursor:pointer">`
                : '<p style="color:var(--text3);font-size:13px">No image available</p>')}
        </div>
      </div>
      <div>
        ${showOsSection ? `
          <h3 style="font-size:14px;color:var(--text2);margin-bottom:8px">OS Pattern</h3>
          <div class="pattern-image-wrap">
            ${osRenderCoords.length
              ? renderPatternSVG(osRenderCoords, { isPolar: osRenderPolar, mirror: osRenderMirror, label: `${esc(patName)} (OS)` })
              : `<img src="${imgOS[0].url}" alt="OS" onclick="openLightbox('${imgOS[0].url}')" style="cursor:pointer">`}
          </div>
        ` : ''}
        ${coords.length ? (() => {
          const testPts = coords.filter(c => !c.type);
          const markers = coords.filter(c => c.type);
          const totalLabel = markers.length > 0
            ? `${testPts.length} test points + ${markers.length} marker${markers.length>1?'s':''}${isPolar ? ', polar' : ''}`
            : `${coords.length} points${isPolar ? ', polar' : ''}`;
          return `
          <h3 style="font-size:14px;color:var(--text2);margin-bottom:8px">Point Coordinates (${totalLabel})</h3>
          <div class="coord-table">
            <table>
              ${isPolar
                ? `<tr><th>#</th><th>r (°)</th><th>θ (°)</th>${coords[0]?.type !== undefined || coords.some(c=>c.type) ? '<th>Type</th>' : ''}${coords[0]?.count ? '<th>Count</th>' : ''}</tr>
                   ${coords.map((c,i) => `<tr><td>${i+1}</td><td>${c.r}</td><td>${c.theta}</td>${coords.some(cc=>cc.type) ? `<td>${c.type || 'test'}</td>` : ''}${c.count ? `<td>${c.count}</td>` : ''}</tr>`).join('')}`
                : `<tr><th>#</th><th>X</th><th>Y</th>${coords[0]?.count ? '<th>Count</th>' : ''}</tr>
                   ${coords.map((c,i) => `<tr><td>${i+1}</td><td>${c.x}</td><td>${c.y}</td>${c.count ? `<td>${c.count}</td>` : ''}</tr>`).join('')}`
              }
            </table>
          </div>
        `;})() : ''}
      </div>
    </div>

    ${(() => {
      // ── Also Available On: linked devices from PF.deviceLink ──
      const devLinks = Array.isArray(pf[PF.deviceLink]) ? pf[PF.deviceLink] : [];
      if (!devLinks.length) return '';
      // Short-year: extract optional "ca." prefix + 4-digit year ("2023", "ca. 1998").
      const shortYear = s => {
        const t = String(s || '');
        const m = t.match(/(?:ca\.\s*)?\b\d{4}\b/);
        return m ? m[0] : '';
      };
      // Short manufacturer: first line, truncate mid-word if too long.
      const shortMfr = s => {
        const first = String(s || '').split('\n')[0].trim();
        return first.length > 42 ? first.slice(0, 40).replace(/[\s,;:·\-]+$/, '') + '…' : first;
      };
      // Enrich from allRecords for richer display + sorting.
      // NOTE: with returnFieldsByFieldId=true, linked-record fields return as arrays of
      // record-ID STRINGS, not {id,name} objects. Normalize both forms defensively
      // (same pattern used by fetchPFForModel at line ~497).
      const entries = devLinks.map(dl => {
        const did = typeof dl === 'string' ? dl : dl?.id;
        const dname = typeof dl === 'string' ? '' : (dl?.name || '');
        const full = allRecords.find(r => r.id === did);
        const f = full?.fields || {};
        const modelRaw = f[F.model] || dname || '';
        return {
          id: did,
          model: String(modelRaw).replace(/\r?\n/g, ' ').trim(),
          mfr: shortMfr(f[F.manufacturer]),
          year: shortYear(f[F.releaseYear]),
          yearSort: (s => { const m = String(s || '').match(/\d{4}/); return m ? parseInt(m[0], 10) : 9999; })(f[F.releaseYear]),
          isCurrent: did === modelId,
        };
      }).filter(e => e.id);  // drop any malformed link entries
      // Sort: manufacturer asc → release year asc → model asc
      entries.sort((a, b) =>
        a.mfr.localeCompare(b.mfr) ||
        (a.yearSort - b.yearSort) ||
        a.model.localeCompare(b.model)
      );
      const others = entries.filter(e => !e.isCurrent).length;
      const summary = others > 0
        ? `This pattern geometry is shared across ${entries.length} device${entries.length > 1 ? 's' : ''} (${others} other${others > 1 ? 's' : ''} besides this one).`
        : `This pattern is currently linked only to this device.`;
      const cards = entries.map(e => {
        const curTag = e.isCurrent ? '<span class="pd-current-tag">current device</span>' : '';
        const meta = [e.mfr, e.year].filter(Boolean).join(' · ');
        const inner = `<span class="pd-model">${esc(e.model)}</span>${meta ? `<span class="pd-meta">${esc(meta)}</span>` : ''}${curTag}`;
        return e.isCurrent
          ? `<div class="pf-device-link current">${inner}</div>`
          : `<a class="pf-device-link" href="#model/${e.id}">${inner}</a>`;
      }).join('');
      const initiallyOpen = entries.length <= 12;
      return `
        <div class="detail-section full-width" style="margin-top:20px">
          <div class="section-head${initiallyOpen ? ' open' : ''}" onclick="toggleSection(this)">ALSO AVAILABLE ON (${entries.length} device${entries.length > 1 ? 's' : ''}) <span class="chevron">▾</span></div>
          <div class="section-body${initiallyOpen ? '' : ' collapsed'}">
            <div class="pf-devices-summary">${summary}</div>
            <div class="pf-devices">${cards}</div>
          </div>
        </div>
      `;
    })()}

    ${pf[PF.uncertaintyNotes] ? `
    <div class="detail-section full-width" style="margin-top:16px">
      <div class="section-head open" onclick="toggleSection(this)">UNCERTAINTY NOTES <span class="chevron">▾</span></div>
      <div class="section-body">
        <div class="comments-block">${esc(pf[PF.uncertaintyNotes])}</div>
      </div>
    </div>` : ''}
  `;
  $app.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// SECTION TOGGLE
// ═══════════════════════════════════════════════════════════════
function toggleSection(el) {
  el.classList.toggle('open');
  const body = el.nextElementSibling;
  if (body) body.classList.toggle('collapsed');
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION / ROUTER
// ═══════════════════════════════════════════════════════════════
function goHome() {
  // Close lightbox if open
  const lb = document.getElementById('lightbox');
  if (lb && lb.classList.contains('open')) closeLightbox(true);
  // Reset any active Level 0 filter so "home" truly means the unfiltered root.
  // sortMode is intentionally left alone (it's a user preference, less
  // obtrusive than a filter that hides most of the catalog).
  formFactorFilter = 'all';
  countryFilter = 'all';
  // If already at root, re-render (hashchange won't fire for same hash)
  if (!location.hash || location.hash === '#') {
    renderProducts();
    window.scrollTo(0, 0);
  } else {
    // Use pushState to cleanly remove hash without leaving '#' in URL
    history.pushState(null, '', location.pathname + location.search);
    route();
  }
}

function route() {
  const hash = location.hash || '#';
  const parts = hash.slice(1).split('/');
  const level = parts[0];
  
  if (level === 'product' && parts[1]) {
    renderProduct(decodeURIComponent(parts[1]));
  } else if (level === 'model' && parts[1]) {
    renderModel(parts[1]);
  } else if (level === 'pattern' && parts[1]) {
    renderPattern(parts[1], parts[2] || '');
  } else {
    renderProducts();
  }
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  try {
    allRecords = await fetchAllMain();
    // Normalize: put cellValuesByFieldId into fields
    allRecords.forEach(r => {
      if (r.cellValuesByFieldId && !r.fields) r.fields = r.cellValuesByFieldId;
      if (!r.fields) r.fields = {};
    });
    window.addEventListener('hashchange', route);
    window.addEventListener('popstate', e => {
      if (document.getElementById('lightbox').classList.contains('open')) {
        closeLightbox(true);
      }
    });
    route();
  } catch(e) {
    $app.innerHTML = `<div class="loading"><p style="color:var(--red)">Error loading data: ${esc(e.message)}</p></div>`;
    console.error(e);
  }
}

init();
</script>
