<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automated Perimeter Archive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.4/photoswipe.css">
<style>
:root {
  --bg: #f6f4ec;
  --bg2: #fbf9f2;
  --bg3: #ebe7d8;
  --bg4: #e1dcc9;
  --border: #d8d2be;
  --border2: #c2baa1;
  --text: #1f2a23;
  --text2: #4d574c;
  --text3: #847e6c;
  --accent: #4a7a5a;
  --accent2: #355c43;
  --accent-soft: rgba(74,122,90,.08);
  --green: #2d8a5e;
  --amber: #a07810;
  --red: #c43c3c;
  --radius: 10px;
  --radius-sm: 6px;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.55; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Header ── */
.site-header { 
  padding: 20px 28px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  background: var(--bg2); position: sticky; top: 0; z-index: 100;
}
.site-title { font-size: 15px; font-weight: 600; letter-spacing: .06em; color: var(--text2); cursor: pointer; user-select: none; transition: color .15s ease; }
.site-title:hover { color: var(--text); }
.site-title:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 2px; }
.site-title span { color: var(--accent); }
.header-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); }

/* ── Breadcrumb ── */
.breadcrumb { 
  padding: 10px 28px; font-size: 13px; color: var(--text3);
  border-bottom: 1px solid var(--border); background: var(--bg);
  font-family: var(--mono); display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.breadcrumb a { color: var(--text2); }
.breadcrumb a:hover { color: var(--accent); text-decoration: none; }
.breadcrumb .sep { color: var(--text3); opacity: .5; }

/* ── Container ── */
.container { max-width: 1200px; margin: 0 auto; padding: 24px 28px 60px; }

/* ── Loading ── */
.loading { text-align: center; padding: 80px 20px; }
.loading .spinner { 
  width: 32px; height: 32px; border: 3px solid var(--border2);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); }}
.loading p { color: var(--text3); font-size: 14px; }

/* ── Sort controls ── */
.sort-bar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.sort-bar label { font-size: 12px; color: var(--text3); font-family: var(--mono); letter-spacing: .05em; }
.record-count { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-left: auto; }

/* ── Form Factor filter pulldown ── */
.ff-filter-group { display: flex; align-items: center; gap: 8px; }
.ff-filter-group label { font-size: 12px; color: var(--text3); font-family: var(--mono); letter-spacing: .05em; }
.ff-filter {
  font-size: 12px; font-family: var(--mono); padding: 5px 28px 5px 12px;
  border: 1px solid var(--border2); border-radius: 20px;
  background: transparent; color: var(--text2); cursor: pointer;
  transition: all .15s;
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6' fill='none' stroke='%238694a7' stroke-width='1.5'><path d='M1 1 L5 5 L9 1'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 8px;
}
.ff-filter:hover { border-color: var(--accent); color: var(--accent); }
.ff-filter:focus { outline: none; border-color: var(--accent); }
.ff-filter.active { background-color: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.sort-bar-divider { width: 1px; align-self: stretch; background: var(--border); margin: 2px 4px; }

/* ── Custom dropdown (used for Country filter so flag <img> works everywhere,
     including Windows where Unicode regional indicators don't render as flags) ── */
.cd { position: relative; display: inline-block; }
.cd-button {
  display: inline-flex; align-items: center; gap: 6px;
  /* Reuses .ff-filter for pill shape + chevron + active-state colours. */
}
.cd-button > span { white-space: nowrap; }
.cd-flag {
  width: 16px; height: auto; border-radius: 1px;
  display: inline-block; flex-shrink: 0;
  box-shadow: 0 0 0 1px rgba(0,0,0,.08);
}
.cd-flag-placeholder {
  width: 16px; height: 11px;
  display: inline-block; flex-shrink: 0;
}
.cd-menu {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 50;
  min-width: 100%; max-height: 340px; overflow-y: auto;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 6px 20px -6px rgba(0,0,0,.22);
  padding: 4px;
}
.cd-menu[hidden] { display: none; }
.cd-option {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 6px 10px; border: 0; background: transparent; cursor: pointer;
  font-family: var(--mono); font-size: 12px; color: var(--text2);
  text-align: left; border-radius: 4px;
  white-space: nowrap;
}
.cd-option:hover { background: var(--accent-soft); color: var(--accent); }
.cd-option.selected { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
.cd-option:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

/* ── Product Cards (Level 0) ── */
.product-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}
.product-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  cursor: pointer; transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  display: flex; flex-direction: column;
  position: relative;
}
.product-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 70%);
  opacity: 0; transition: opacity .2s ease;
}
.product-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px -8px rgba(0,0,0,.18);
}
.product-card:hover::before { opacity: 1; }

.product-head {
  padding: 14px 16px 10px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
}
.product-head-left { flex: 1; min-width: 0; }
.product-name {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin-bottom: 5px; letter-spacing: -.005em; line-height: 1.3;
}
.product-meta-row {
  font-size: 11px; color: var(--text3);
  font-family: var(--mono);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.product-flag-inline { display: inline-flex; align-items: center; gap: 5px; color: var(--text2); }
.product-flag-inline img { width: 16px; height: auto; border-radius: 1px; display: block; box-shadow: 0 0 0 1px rgba(0,0,0,.06); }
.product-year-badge {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  padding: 3px 8px; border-radius: 3px;
  background: var(--accent-soft); color: var(--accent);
  letter-spacing: .03em; white-space: nowrap; flex-shrink: 0;
}

.product-thumbs {
  padding: 4px 16px 12px;
  display: flex; gap: 6px; align-items: center;
  min-height: 58px;
}
.product-thumb {
  width: 56px; height: 56px; flex-shrink: 0;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; object-fit: contain; padding: 3px;
  transition: border-color .15s ease;
}
.product-card:hover .product-thumb { border-color: var(--border-soft, var(--border)); }
.product-thumbs-more {
  font-family: var(--mono); font-size: 10px; letter-spacing: .04em;
  color: var(--text3); flex-shrink: 0;
  padding: 0 4px 0 2px;
}
.product-thumb-placeholder {
  width: 56px; height: 56px; flex-shrink: 0;
  background: var(--bg); border: 1px dashed var(--border);
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  color: var(--text3); opacity: .5;
}

.product-footer {
  padding: 9px 16px 11px;
  border-top: 1px solid var(--border);
  font-size: 11px; font-family: var(--mono);
  display: flex; justify-content: space-between; align-items: center;
  letter-spacing: .03em;
}
.product-count { color: var(--text2); }
.product-type-tag {
  font-size: 10px; padding: 2px 7px; border-radius: 2px;
  background: var(--bg3); color: var(--text2);
  letter-spacing: .05em; text-transform: uppercase;
}
.product-ff-tags { display: inline-flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

/* ── Model List (Level 1) ── */
.model-list { display: flex; flex-direction: column; gap: 8px; }
.model-row {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px;
  cursor: pointer; transition: all .15s;
  display: grid; grid-template-columns: auto 112px 1fr auto; gap: 14px; align-items: center;
}
/* Mobile: drop the year onto a 2nd row beneath the name, so the
   name+manufacturer column gets full remaining width instead of being
   squeezed by the year (which can be up to 30 chars of mono font like
   "ca. 1977-1978 (📌 replaced Mod"). PC layout unchanged. */
@media (max-width: 599px) {
  .model-row {
    grid-template-columns: auto 112px 1fr;
    grid-template-areas:
      "so thumb name"
      "so thumb year";
    column-gap: 12px;
    row-gap: 4px;
    align-items: start;
  }
  .model-row > .model-so { grid-area: so; align-self: center; }
  .model-row > .model-thumb,
  .model-row > .model-thumb-empty,
  .model-row > .model-thumb-overview { grid-area: thumb; align-self: center; }
  .model-row > .model-name-block { grid-area: name; }
  .model-row > .model-year { grid-area: year; }
}
.model-row:hover { border-color: var(--accent); background: var(--bg3); }
.model-so { font-family: var(--mono); font-size: 12px; color: var(--text3); min-width: 32px; text-align: right; }
.model-thumb { width: 112px; height: 84px; object-fit: contain; border-radius: 4px; background: var(--bg); display: block; }
.model-thumb-empty { width: 112px; height: 84px; border-radius: 4px; background: var(--bg3); display: flex; align-items: center; justify-content: center; color: var(--text3); }
.model-thumb-empty svg { width: 100%; height: 100%; padding: 8px; box-sizing: border-box; }
.model-name { font-size: 14px; font-weight: 500; }
.model-year { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.model-mfr { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* Overview row variant ── distinguishes Family Overview aggregator records */
.model-row-overview {
  border-left: 3px solid var(--accent);
  background: linear-gradient(90deg, var(--accent-soft) 0%, var(--bg2) 30%);
}
.model-row-overview:hover { background: linear-gradient(90deg, var(--accent-soft) 0%, var(--bg3) 30%); }
.model-thumb-overview {
  width: 112px; height: 84px; border-radius: 4px;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
}
.model-thumb-overview svg { width: 90px; height: 65px; }
.model-thumb-overview .ovw-back  { fill: var(--accent); opacity: .25; }
.model-thumb-overview .ovw-mid   { fill: var(--accent); opacity: .55; }
.model-thumb-overview .ovw-front { fill: var(--accent2); }
.overview-badge {
  display: inline-block;
  margin-left: 8px;
  font-size: 9px;
  font-family: var(--mono);
  color: var(--accent);
  letter-spacing: .12em;
  font-weight: 600;
  background: var(--accent-soft);
  padding: 2px 6px;
  border-radius: 3px;
  vertical-align: middle;
}

/* ── Model Detail (Level 2) ── */
.detail-header { margin-bottom: 24px; }
.detail-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.detail-sub { font-size: 13px; color: var(--text2); }
.detail-sub span { margin-right: 16px; }
.country-flag-inline {
  width: 18px; height: auto; border-radius: 1px;
  margin-right: 4px; vertical-align: -3px;
}

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }

.detail-section {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.detail-section.full-width { grid-column: 1 / -1; }
.section-head {
  padding: 12px 16px; font-size: 12px; font-weight: 600;
  letter-spacing: .08em; color: var(--text2);
  border-bottom: 1px solid var(--border); background: var(--bg3);
  cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  user-select: none;
}
.section-head .chevron { transition: transform .2s; font-size: 14px; }
.section-head.open .chevron { transform: rotate(180deg); }
.section-body { padding: 14px 16px; }
.section-body.collapsed { display: none; }

.spec-row { 
  display: flex; gap: 8px; padding: 5px 0; 
  border-bottom: 1px solid var(--border); font-size: 13px;
}
.spec-row:last-child { border-bottom: none; }
.spec-label { color: var(--text3); min-width: 140px; flex-shrink: 0; font-family: var(--mono); font-size: 11px; }
.spec-value { color: var(--text); word-break: break-word; white-space: pre-wrap; }

/* ── Lightbox (PhotoSwipe v5 — Microsoft Photos style) ── */
.pswp { --pswp-bg: #0f1216; --pswp-icon-color: #fff; --pswp-icon-color-secondary: #fff; }
.pswp__bg { background: rgba(15,18,22,0.96); }

/* HIDE PhotoSwipe's default arrow buttons completely. They have built-in
   touch-device hiding logic that's hard to override reliably across all
   browsers + caches. We add our own custom arrows below with distinct
   class names that PhotoSwipe doesn't target. */
.pswp__button--arrow {
  display: none !important;
}

/* Custom arrow buttons (cu-arrow). Independent of PhotoSwipe's
   .pswp__button--arrow rules — visibility on all devices. */
.cu-arrow {
  position: absolute !important;
  top: 50% !important;
  transform: translateY(-50%) !important;
  width: 44px !important;
  height: 44px !important;
  margin: 0 !important;
  padding: 0 !important;
  background: rgba(255,255,255,0.12) !important;
  border: 0 !important;
  border-radius: 50% !important;
  cursor: pointer !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  visibility: visible !important;
  opacity: 0.9 !important;
  z-index: 100 !important;
  transition: background 0.15s, opacity 0.15s !important;
  -webkit-appearance: none !important;
  -webkit-tap-highlight-color: transparent !important;
}
.cu-arrow:hover { background: rgba(255,255,255,0.26) !important; opacity: 1 !important; }
.cu-arrow:active { background: rgba(255,255,255,0.34) !important; }
.cu-arrow-prev { left: 16px !important; }
.cu-arrow-next { right: 16px !important; }
.cu-arrow svg {
  width: 22px !important;
  height: 22px !important;
  stroke: #ffffff !important;
  fill: none !important;
  display: block !important;
  pointer-events: none !important;
}
.cu-arrow:disabled,
.cu-arrow[disabled] {
  opacity: 0.22 !important;
  cursor: default !important;
  pointer-events: none !important;
}

/* Counter (top-left) */
.pswp__counter {
  font-family: var(--mono); font-size: 12px;
  color: rgba(255,255,255,0.85);
  height: 40px; line-height: 40px;
  padding: 0 14px; opacity: 1;
  text-shadow: none; background: transparent;
}
/* Close button (top-right) */
.pswp__button--close {
  opacity: 0.85;
  transition: opacity 0.15s, background 0.15s;
  border-radius: 50%;
}
.pswp__button--close:hover { opacity: 1; background: rgba(255,255,255,0.18) !important; }
.pswp__button--close svg {
  width: 14px !important;
  height: 14px !important;
  stroke: #fff !important;
  fill: none !important;
}
/* Force top-bar always visible (override tap-to-hide on mobile) */
.pswp__top-bar { opacity: 1 !important; }
/* Caption — Microsoft Photos style: bottom-centered pill */
.pswp__caption {
  position: absolute;
  bottom: 18px; left: 50%; transform: translateX(-50%);
  max-width: 80%;
  color: rgba(255,255,255,0.88);
  font-family: var(--font); font-size: 13px;
  text-align: center;
  background: rgba(0,0,0,0.45);
  padding: 6px 14px;
  border-radius: 16px;
  pointer-events: none;
  z-index: 10;
}
.pswp__caption:empty { display: none; }

/* ── Image gallery thumbnails ── */
/* Responsive grid: 2 columns on mobile, 3 columns on tablet & desktop.
   (Was 4-col on >=900px — dropped per Chota request so thumbs render
   ~33% larger on initial gallery view. Lightbox sizing unchanged.) */
.image-gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (min-width: 600px) {
  .image-gallery { grid-template-columns: repeat(3, 1fr); gap: 10px; }
}
.image-gallery figure {
  margin: 0;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0; /* allow grid cell to shrink below content size */
}
.image-gallery a {
  display: block;
  aspect-ratio: 1 / 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: border-color .15s, transform .15s;
}
.image-gallery a:hover { border-color: var(--accent); transform: scale(1.02); }
.image-gallery img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  cursor: pointer;
  display: block;
  background: var(--bg);
}
.image-gallery figcaption {
  font-size: 11px; color: var(--muted);
  line-height: 1.3; word-break: break-word;
}

/* ── Strategies ── */
.strategies-block { font-size: 13px; white-space: pre-wrap; font-family: var(--mono); line-height: 1.6; }
.strategies-block .section-label { color: var(--accent); font-weight: 600; }

/* ── References ── */
.references-block { font-size: 12px; color: var(--text2); white-space: pre-wrap; line-height: 1.7; font-family: var(--mono); }
.references-block a { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent); word-break: break-all; }
.references-block a:hover { text-decoration: none; border-bottom-style: solid; color: var(--accent2); }

/* ── Pattern grid ── */
.pattern-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.pattern-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px;
  cursor: pointer; transition: all .15s; text-align: center;
  display: flex; flex-direction: column;
}
.pattern-card:hover { border-color: var(--accent); background: var(--bg4); }
.pattern-card .pname {
  font-size: 13px; font-weight: 500; margin-bottom: 4px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; line-height: 1.3; min-height: 2.6em;
}
.pattern-card .pcat { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.pattern-card .pcount { font-size: 11px; color: var(--text2); margin-top: 4px; }
.pattern-card img {
  max-width: 100%; max-height: 120px; border-radius: 4px;
  margin-top: 8px; margin-left: auto; margin-right: auto;
  object-fit: contain; display: block;
}
.pattern-card .pattern-thumb-svg {
  width: 120px; height: 120px; margin: 8px auto 0;
  border-radius: 4px; background: #fff; border: 1px solid var(--border);
}
.pattern-card .pattern-thumb-svg svg { width: 100%; height: 100%; display: block; }

/* ── Pattern Detail (Level 3) ── */
.pattern-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 768px) { .pattern-detail-grid { grid-template-columns: 1fr; } }
.pattern-image-wrap { text-align: center; }
.pattern-image-wrap img { max-width: 100%; max-height: 400px; border-radius: var(--radius); border: 1px solid var(--border); }
.coord-table { font-family: var(--mono); font-size: 11px; max-height: 300px; overflow-y: auto; }
.coord-table table { width: 100%; border-collapse: collapse; }
.coord-table th, .coord-table td { padding: 3px 8px; border-bottom: 1px solid var(--border); text-align: right; }
.coord-table th { color: var(--text3); position: sticky; top: 0; background: var(--bg2); }
.coord-provenance { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-family: var(--mono); border: 1px solid; }
.coord-provenance .cp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.coord-provenance .cp-detail { color: var(--text3); font-style: italic; }
.coord-provenance[data-prov="Exact"] { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.35); color: #10b981; }
.coord-provenance[data-prov="Exact"] .cp-dot { background: #10b981; }
.coord-provenance[data-prov="Image-derived"] { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.35); color: #f59e0b; }
.coord-provenance[data-prov="Image-derived"] .cp-dot { background: #f59e0b; }

async function fetchAllMain() {
  const fields = [
    F.model, F.productName, F.groupSort, F.sortOrder, F.manufacturer, F.type, F.formFactor,
    F.releaseYear, F.country, F.flag, F.displayName, F.specialComments, F.familyOverview, F.references,

    F.analysis, F.platformNotes,

    F.fpDetection, F.fnDetection, F.retestMethod, F.reliabilityNote,
    F.mfrUrl, F.image, F.lastModified,
  ];
  let all = [], offset = null;
  do {
    let url = `https://api.airtable.com/v0/${BASE_ID}/${MAIN_TABLE}?pageSize=100&returnFieldsByFieldId=true`;
    fields.forEach(f => url += `&fields%5B%5D=${f}`);
    url += `&sort%5B0%5D%5Bfield%5D=${F.sortOrder}&sort%5B0%5D%5Bdirection%5D=asc`;
    if (offset) url += `&offset=${offset}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
    if (!res.ok) throw new Error(`Airtable ${res.status}`);
    const data = await res.json();
    all.push(...data.records);
    offset = data.offset;
  } while (offset);
  return all;
}

async function fetchPFForModel(recId) {
  if (pfCache[recId]) return pfCache[recId];
  
  // Get linked PF record IDs from main record
  const mainRec = allRecords.find(r => r.id === recId);
  if (!mainRec) return [];
  const linked = mainRec.fields?.[F.patternsLinked];
  if (!linked || !linked.length) return [];
  
  const pfIds = linked.map(l => typeof l === 'object' ? l.id : l).filter(Boolean);
  if (!pfIds.length) return [];
  
  const fields = [PF.name, PF.patternId, PF.so, PF.deviceLink, PF.pointCount, 
    PF.description, PF.category, PF.measMode, PF.eyeVariant, PF.uncertaintyNotes, PF.provenance,
    PF.coordsOD, PF.coordsOS, PF.coordsOdPolar, PF.coordsOsPolar,
    PF.osMirror, PF.imageOD, PF.imageOS, PF.displayPrimary];
  
  let allPF = [];
  // Batch in groups of 20 to keep URL length manageable
  for (let i = 0; i < pfIds.length; i += 20) {
    const batch = pfIds.slice(i, i + 20);
    const formula = `OR(${batch.map(b => `RECORD_ID()='${b}'`).join(',')})`;
    let url = `https://api.airtable.com/v0/${BASE_ID}/${PF_TABLE}?returnFieldsByFieldId=true&pageSize=100`;
    fields.forEach(f => url += `&fields%5B%5D=${f}`);
    url += `&filterByFormula=${encodeURIComponent(formula)}`;
    try {
      const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
      if (res.ok) {
        const data = await res.json();
        allPF.push(...(data.records || []));
      }
    } catch(e) { console.error('PF fetch error:', e); }
  }
  // Sort by PatternsLinked array order (preserves Test Patterns listing order)
  const idOrder = new Map(pfIds.map((id, i) => [id, i]));
  allPF.sort((a, b) => (idOrder.get(a.id) ?? 999) - (idOrder.get(b.id) ?? 999));
  pfCache[recId] = allPF;
  return allPF;
}

// ── Strict-format parsers (Test Patterns + Test Strategies [Abbreviations]) ──
// Parses Main.Test Patterns text into { patternId -> [abbrev, ...] }.
// Accepted line format: "{Pattern ID}: {abbrev1}, {abbrev2}, ..."
// Lines that do not match are ignored (e.g. section headers, narrative notes,
// "See linked Pattern Figures.", 📌 flags).
function parseTestPatterns(text) {
  const map = {};
  if (!text || typeof text !== 'string') return map;
  // Preferred: a dedicated machine-readable section keyed by Pattern ID.
  // We look for [Pattern Strategy Map] (or [PatternStrategyMap]) and parse
  // strict "PatternID: strat1, strat2, ..." lines until the next [Section].
  // This lets the human-readable Test Patterns text use any narrative style
  // (bullets, sub-headings, prose) without confusing the parser.
  let inMap = false;
  text.split(/\r?\n/).forEach(rawLine => {
    const line = rawLine.trim();
    if (/^\[\s*pattern\s*strategy\s*map\s*\]/i.test(line)) { inMap = true; return; }
    if (inMap && /^\[/.test(line)) { inMap = false; return; }
    if (!inMap || !line) return;
    if (line.startsWith('//') || line.startsWith('#')) return; // allow comments
    const colon = line.indexOf(':');
    if (colon < 1) return;
    const pid = line.slice(0, colon).trim();
    if (!pid || pid.length > 60) return;
    const rest = line.slice(colon + 1).trim();
    if (!rest) return;
    const strategies = rest.split(',').map(s => s.trim()).filter(Boolean);
    if (strategies.length) map[pid] = strategies;
  });
  if (Object.keys(map).length) return map;
  // Fallback: legacy strict-format parsing (1 line per pattern, no header).
  // Kept for backward compatibility with records that haven't been migrated
  // to use a dedicated [Pattern Strategy Map] section yet.
  text.split(/\r?\n/).forEach(rawLine => {
    const line = rawLine.trim();
    if (!line) return;
    if (line.startsWith('[')) return;
    if (line.startsWith('See ')) return;
    if (line.startsWith('📌') || line.startsWith('\u{1F4CC}')) return;
    if (line.startsWith('•') || line.startsWith('–') || line.startsWith('-')) return;
    const colon = line.indexOf(':');
    if (colon < 1) return;
    const pid = line.slice(0, colon).trim();
    if (pid.length > 40) return;
    const rest = line.slice(colon + 1).trim();
    if (!rest) return;
    const strategies = rest.split(',').map(s => s.trim()).filter(Boolean);
    if (strategies.length) map[pid] = strategies;
  });
  return map;
}

// Parses Main.Test Strategies [Abbreviations] section into { abbrev -> fullName }.
function parseAbbreviations(text) {
  const map = {};
  if (!text || typeof text !== 'string') return map;
  let inAbbrev = false;
  text.split(/\r?\n/).forEach(rawLine => {
    const line = rawLine.trim();
    if (/^\[\s*Abbreviations\s*\]/i.test(line)) { inAbbrev = true; return; }
    if (inAbbrev && /^\[/.test(line)) { inAbbrev = false; return; }
    if (!inAbbrev || !line) return;
    const m = line.match(/^([A-Za-z0-9_+\-]+)\s*=\s*(.+)$/);
    if (m) map[m[1].trim()] = m[2].trim();
  });
  return map;
}
// Auto-linkify PMID / PMC / DOI / plain URLs inside already-HTML-escaped text.
// Input MUST come from esc() or equivalent (no untrusted HTML).
function linkifyRefs(escapedText) {
  const PM_URL  = 'https://pubmed.ncbi.nlm.nih.gov/';
  const PMC_URL = 'https://www.ncbi.nlm.nih.gov/pmc/articles/';
  const DOI_URL = 'https://doi.org/';
  const A = (href, label) => `<a href="${href}" target="_blank" rel="noopener noreferrer">${label}</a>`;

  let t = escapedText;

  // 1) PMID: 12345678  /  PMID:12345678  /  PMID 12345678
  t = t.replace(/\bPMID[:：]?\s*(\d{5,9})\b/gi,
    (match, id) => A(`${PM_URL}${id}/`, match));

  // 2) PMC1234567
  t = t.replace(/\bPMC(\d{4,9})\b/g,
    (match) => A(`${PMC_URL}${match}/`, match));

  // 3) doi: 10.xxxx/yyy  (preserve original "doi:" / "DOI:" prefix; trim trailing punctuation from DOI)
  t = t.replace(/\b(doi[:：]\s*)(10\.\d{4,9}\/[^\s<>"()\[\]]+)/gi,
    (match, prefix, doi) => {
      const clean = doi.replace(/[.,;:]+$/, '');
      const trailing = doi.slice(clean.length);
      return `${prefix}${A(`${DOI_URL}${clean}`, clean)}${trailing}`;
    });

  // 4) Plain URLs — avoid re-linkifying URLs inside anchors added above.
  //    Split around existing <a>...</a> tags; only linkify in the text segments.
  const parts = [];
  let last = 0;
  const anchorRe = /<a\s[^>]*>[\s\S]*?<\/a>/g;
  let m;
  while ((m = anchorRe.exec(t)) !== null) {
    parts.push(t.slice(last, m.index));
    parts.push(m[0]);
    last = m.index + m[0].length;
  }
  parts.push(t.slice(last));
  const urlRe = /(https?:\/\/[^\s<>"()]+)/g;
  return parts.map((p, i) => {
    if (i % 2 === 1) return p; // existing anchor, skip
    return p.replace(urlRe, (url) => {
      const clean = url.replace(/[.,;:!?]+$/, '');
      const trailing = url.slice(clean.length);
      return `${A(clean, clean)}${trailing}`;
    });
  }).join('');
}
function flagImg(rec) {
  const flagArr = rec.fields?.[F.flag];
  if (!flagArr || !flagArr.length) return '';
  return flagArr[0].url || flagArr[0].thumbnails?.small?.url || '';
}
function countryName(rec) {
  const c = rec.fields?.[F.country];
  return c ? (typeof c === 'object' ? c.name : c) : '';
}
// Collect distinct {name, flag} entries across a record list, preserving the
// order of first appearance (records are SO-sorted, so earliest-dated country
// comes first). Needed for product groups whose records span multiple countries
// — e.g. Competer (Sweden origin, then USA distribution) — where showing only
// the first record's flag would hide the other countries entirely.
function collectCountries(records) {
  const seen = new Set();
  const out = [];
  for (const r of records) {
    const name = countryName(r);
    if (!name || seen.has(name)) continue;
    seen.add(name);
    out.push({ name, flag: flagImg(r) });
  }
  return out;
}
function extractYear(s) {
  if (!s) return 9999;
  const m = String(s).match(/(\d{4})/);
  return m ? parseInt(m[1]) : 9999;
}
function groupProducts(records) {
  const groups = {};
  records.forEach(r => {
    const pn = g(r, F.productName) || g(r, F.model) || '(Unknown)';
    if (!groups[pn]) groups[pn] = [];
    groups[pn].push(r);
  });
  return groups;
}

    items = [{ src: srcOrItems, width: 0, height: 0, alt: '' }];
    index = 0;
  } else if (Array.isArray(srcOrItems)) {
    items = srcOrItems;
    index = idx || 0;
  } else {
    return;
  }
  if (window.openPSLightbox) {
    window.openPSLightbox(items, index);
  } else {
    // Module not yet loaded — fallback: open in new tab
    window.open(items[index].src, '_blank');
  }
}
function closeLightbox() {
  if (window.closePSLightbox) window.closePSLightbox();
}

const $app = document.getElementById('app');
const $bc = document.getElementById('breadcrumb');

function setBreadcrumb(items) {

    if (i < items.length - 1) return `<a href="${it.hash}">${esc(it.label)}</a><span class="sep">›</span>`;

// ── Level 0: Product List ──
function productCardHtml(p) {
  const countries = collectCountries(p.records);
  const yearStr = p.year < 9999 ? p.year : '?';

  // Collect thumbs from records in group (records[0] is lowest SO → oldest first)
  const thumbs = [];
  for (const r of p.records) {
    const imgs = r.fields?.[F.image];
    if (imgs && imgs.length) {
      const src = imgs[0].thumbnails?.large?.url || imgs[0].url;
      if (src) thumbs.push({ src, name: g(r, F.model) || '' });
    }
  }
  const MAX_THUMBS = 6;
  const visible = thumbs.slice(0, MAX_THUMBS);
  const overflow = thumbs.length - visible.length;

  const flagsHtml = countries.map(c => `
    <span class="product-flag-inline">
      ${c.flag ? `<img src="${c.flag}" alt="${esc(c.name)}">` : ''}
      <span>${esc(c.name)}</span>
    </span>
  `).join('');

  const thumbsHtml = visible.length
    ? visible.map(t => `<img class="product-thumb" src="${t.src}" alt="${esc(t.name)}" title="${esc(t.name)}" loading="lazy">`).join('')
      + (overflow > 0 ? `<span class="product-thumbs-more">+${overflow}</span>` : '')
    : `<div class="product-thumb-placeholder" title="No images yet">
         <svg viewBox="0 0 38 38" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
           <path d="M7 28 Q7 10 19 8 Q31 10 31 28" fill="none" stroke="currentColor" stroke-width="1.5"/>
           <circle cx="19" cy="24" r="1.6" fill="currentColor"/>
           <line x1="19" y1="15" x2="19" y2="22" stroke="currentColor" stroke-width="1.2"/>
         </svg>
       </div>`;

  return `
    <div class="product-card" onclick="location.hash='#product/${encodeURIComponent(p.name)}'">
      <div class="product-head">
        <div class="product-head-left">
          <div class="product-name">${esc(p.name)}</div>
          <div class="product-meta-row">${flagsHtml}</div>
        </div>
        <div class="product-year-badge">${yearStr}</div>
      </div>
      <div class="product-thumbs">${thumbsHtml}</div>
      <div class="product-footer">
        <span class="product-count">${p.records.length} model${p.records.length>1?'s':''}</span>
        ${p.formFactors.length
          ? `<span class="product-ff-tags">${p.formFactors.map(ff => `<span class="product-type-tag">${esc(ff)}</span>`).join('')}</span>`
          : ''}
      </div>

}

function renderProducts() {
  const groups = groupProducts(allRecords);
  const productList = Object.entries(groups).map(([name, records]) => {
    const first = records[0];
    const gs = g(first, F.groupSort);
    const yr = extractYear(gs);
    // Distinct Form Factors and Countries across the group's records.
    // A product that spans multiple buckets will appear once in each matching
    // filter (per archive design — e.g. imo series spans Table Top + HMD/VR,
    // Competer spans Sweden + USA).
    const formFactors = [...new Set(records.map(r => sel(r.fields?.[F.formFactor])).filter(Boolean))];
    const countries = [...new Set(records.map(r => countryName(r)).filter(Boolean))];
    return { name, records, year: yr, first, formFactors, countries };
  });

  // Baseline ordering applies to the full product list first so dropdown
  // labels can reflect totals before filters are applied.
  if (sortMode === 'name') productList.sort((a,b) => a.name.localeCompare(b.name));
  else productList.sort((a,b) => a.year - b.year);

  // ── Faceted filter matchers (reused by counts and by visibility). ──
  const matchFF = (p, ff) => ff === 'all' || (p.formFactors.length === 0 ? ff === 'Other' : p.formFactors.includes(ff));
  const matchCountry = (p, c) => c === 'all' || p.countries.includes(c);

  // Per-bucket counts are computed against the *other* filter's current
  // state so each dropdown's count reflects "what I'd see if I picked this
  // on top of my current selection" — standard faceted-search behaviour.
  const afterCountryOnly = productList.filter(p => matchCountry(p, countryFilter));
  const afterFFOnly = productList.filter(p => matchFF(p, formFactorFilter));

  // Form Factor counts (among products that already pass the country filter).
  const ffCounts = {};
  FORM_FACTOR_ORDER.forEach(ff => {
    ffCounts[ff] = afterCountryOnly.filter(p => matchFF(p, ff)).length;
  });

  // Country counts (among products that already pass the Form Factor filter).
  // Country options come from the data itself — no fixed order. Sort by count
  // descending, then by name ascending as tiebreaker.
  const countryCounts = {};
  afterFFOnly.forEach(p => p.countries.forEach(c => { countryCounts[c] = (countryCounts[c] || 0) + 1; }));
  const countryOptions = Object.keys(countryCounts).sort((a, b) =>
    countryCounts[b] - countryCounts[a] || a.localeCompare(b)
  );

  // Visible list after both filters.
  const visibleList = productList.filter(p => matchFF(p, formFactorFilter) && matchCountry(p, countryFilter));

  setBreadcrumb([{ label: 'Archive', hash: '#' }]);
  const metaEl = document.getElementById('headerMeta');
  metaEl.textContent = `${allRecords.length} models · ${productList.length} products`;
  // Append last-updated timestamp from Airtable Last Modified fields.
  // Aggregates max across Main + PF + LT + jx + PN tables to reflect ANY DB
  // edit, not just edits to Main records themselves. For Main, uses the
  // already-loaded allRecords; for the other four, fetches the single
  // most-recently-modified record per table (one round trip each, sorted by
  // Last Modified desc, pageSize=1, all in parallel). If any source fails it
  // is silently treated as zero.
  // LT/jx/PN Last Modified are formula fields (LAST_MODIFIED_TIME()) added
  // 2026-05-16 to ensure Main lane edits to LT/jx/PN propagate to the stamp.
  (async () => {
    let mainMax = 0;
    for (const r of allRecords) {
      const lm = r.fields?.[F.lastModified];
      if (!lm) continue;
      const t = new Date(lm).getTime();
      if (Number.isFinite(t) && t > mainMax) mainMax = t;
    }
    const fetchLatestModified = async (tableId, fieldId) => {
      try {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${tableId}`
          + `?pageSize=1&returnFieldsByFieldId=true`
          + `&fields%5B%5D=${fieldId}`
          + `&sort%5B0%5D%5Bfield%5D=${fieldId}`
          + `&sort%5B0%5D%5Bdirection%5D=desc`;
        const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
        if (!res.ok) return 0;
        const data = await res.json();
        const lm = data.records?.[0]?.fields?.[fieldId];
        if (!lm) return 0;
        const t = new Date(lm).getTime();
        return Number.isFinite(t) ? t : 0;
      } catch(e) { return 0; }
    };
    const [pfMax, ltMax, jxMax, pnMax] = await Promise.all([
      fetchLatestModified(PF_TABLE,            'fld55IMcyCDSoYv7f'),
      fetchLatestModified('tblt7Y4rElnWHyDp9', 'fld7TNUbD1xGM2zPZ'),  // LT
      fetchLatestModified('tbl5MnlS9rNNnwNUk', 'fldkFCHhlfh2yECXc'),  // jx
      fetchLatestModified('tblpGYSBD1qzVYe40', 'fldQFzjrdPVm4ZiHS'),  // PN
    ]);
    const max = Math.max(mainMax, pfMax, ltMax, jxMax, pnMax);
    if (max <= 0) return;
    const d = new Date(max);
    const pad = n => String(n).padStart(2, '0');
    const stamp = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    metaEl.textContent = `${allRecords.length} models · ${productList.length} products · updated ${stamp}`;
  })();

  // Country name → flag attachment URL, from the first record per country that
  // has a flag attachment. The Country dropdown uses a custom component (not
  // a native <select>) so it can render the real PNG via <img> — this is
  // necessary because Windows fonts do not render Unicode regional indicator
  // pairs as flag glyphs.
  const countryFlagUrls = {};
  for (const r of allRecords) {
    const name = countryName(r);
    if (!name || countryFlagUrls[name]) continue;
    const flagArr = r.fields?.[F.flag];
    if (!flagArr || !flagArr.length) continue;
    const url = flagArr[0].thumbnails?.small?.url || flagArr[0].url;
    if (url) countryFlagUrls[name] = url;
  }

  const ffOptionsHtml = [`<option value="all">All form factors (${afterCountryOnly.length})</option>`]
    .concat(FORM_FACTOR_ORDER
      .filter(ff => ffCounts[ff] > 0)
      .map(ff => `<option value="${esc(ff)}"${ff===formFactorFilter?' selected':''}>${esc(ff)} (${ffCounts[ff]})</option>`))
    .join('');

  // Country dropdown: custom (not native <select>) so flag PNGs render.
  const countryOption = (val, label, count, isSelected) => {
    const url = countryFlagUrls[val];
    const flagHtml = url
      ? `<img class="cd-flag" src="${url}" alt="" loading="lazy">`
      : '<span class="cd-flag-placeholder"></span>';
    return `<button type="button" role="option" aria-selected="${isSelected}" class="cd-option${isSelected?' selected':''}" data-value="${esc(val)}" onclick="selectCountry(this.dataset.value)">${flagHtml}<span>${esc(label)} (${count})</span></button>`;
  };

  const countryMenuHtml = [
    // 'all' option — no flag, placeholder keeps text aligned
    `<button type="button" role="option" aria-selected="${countryFilter==='all'}" class="cd-option${countryFilter==='all'?' selected':''}" data-value="all" onclick="selectCountry('all')"><span class="cd-flag-placeholder"></span><span>All countries (${afterFFOnly.length})</span></button>`,
    ...countryOptions.map(c => countryOption(c, c, countryCounts[c], c === countryFilter)),
  ].join('');

  // Button label: selected country with its flag, or 'All countries (N)'.
  const countryButtonFlagHtml = (countryFilter !== 'all' && countryFlagUrls[countryFilter])
    ? `<img class="cd-flag" src="${countryFlagUrls[countryFilter]}" alt="">`
    : '';
  const countryButtonLabel = countryFilter === 'all'
    ? `All countries (${afterFFOnly.length})`
    : `${countryFilter} (${countryCounts[countryFilter] || 0})`;

  const ffActive = formFactorFilter !== 'all';
  const countryActive = countryFilter !== 'all';
  const anyActive = ffActive || countryActive;
  const countLabel = anyActive
    ? `${visibleList.length} of ${productList.length} products`
    : `${productList.length} products`;

  let html = `
    <div class="sort-bar">
      <div class="ff-filter-group">
        <label>FORM FACTOR</label>
        <select class="ff-filter ${ffActive?'active':''}" onchange="formFactorFilter=this.value;renderProducts()">
          ${ffOptionsHtml}
        </select>
      </div>
      <div class="ff-filter-group">
        <label>COUNTRY</label>
        <div class="cd" id="countryDropdown">
          <button type="button" class="ff-filter cd-button ${countryActive?'active':''}" onclick="toggleCountryDropdown(event)" aria-haspopup="listbox" aria-expanded="false">
            ${countryButtonFlagHtml}<span>${esc(countryButtonLabel)}</span>
          </button>
          <div class="cd-menu" role="listbox" aria-label="Filter by country" hidden>
            ${countryMenuHtml}
          </div>
        </div>
      </div>
      <div class="sort-bar-divider"></div>
      <div class="ff-filter-group">
        <label>SORT BY</label>
        <select class="ff-filter" onchange="sortMode=this.value;renderProducts()">
          <option value="year" ${sortMode==='year'?'selected':''}>Release Year</option>
          <option value="name" ${sortMode==='name'?'selected':''}>Name A-Z</option>
        </select>
      </div>
      <span class="record-count">${countLabel}</span>
    </div>
    <div class="product-grid">${visibleList.map(productCardHtml).join('')}</div>
  `;

  $app.innerHTML = html;
}

// ── Level 1: Product Detail (Model List) ──
function renderProduct(productName) {
  const records = allRecords.filter(r => (g(r, F.productName) || g(r, F.model)) === productName);
  if (!records.length) { $app.innerHTML = '<p>Product not found.</p>'; return; }
  records.sort((a,b) => (gn(a, F.sortOrder)||0) - (gn(b, F.sortOrder)||0));

  setBreadcrumb([
    { label: 'Archive', hash: '#' },
    { label: productName, hash: `#product/${encodeURIComponent(productName)}` }
  ]);

  const countries = collectCountries(records);
  // Collect manufacturers across records, normalizing notation variants to avoid
  // duplicate display (e.g., "Humphrey Instruments Inc" vs "Humphrey Instruments Inc.",
  // "Carl Zeiss Meditec" vs "Carl Zeiss Meditec, Inc.", "(later Allergan)" notes, etc).
  // Strategy: take first line only (subsequent lines are typically address/location),
  // strip parenthetical notes and slash alternates, then dedup by a normalized key
  // that ignores punctuation and common corporate suffixes (Inc/Co/Ltd/AG/GmbH/etc).
  // Records are pre-sorted by SortOrder asc, so first occurrence wins = earliest era.
  const mfrs = (() => {
    const map = new Map();
    for (const r of records) {
      const m = g(r, F.manufacturer);
      if (!m) continue;
      const firstLine = m.split('\n')[0].trim();
      if (!firstLine) continue;
      const display = firstLine
        .replace(/\s*\([^)]*\)\s*/g, ' ')   // strip "(...)" notes
        .split('/')[0]                       // keep primary name before any "/alt" form
        .replace(/\s+/g, ' ')
        .trim();
      if (!display) continue;
      const key = display
        .replace(/[.,]/g, '')
        .replace(/\b(inc|incorporated|co|corp|corporation|ltd|limited|ag|gmbh|llc|kk|sa|spa|bv|nv)\b/gi, '')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
      if (key && !map.has(key)) map.set(key, display);
    }
    return [...map.values()];
  })();

  const countryListHtml = countries
    .map(c => `${c.flag ? `<img src="${c.flag}" class="country-flag-inline" alt="${esc(c.name)}">` : ''}${esc(c.name)}`)
    .join(', ');

  let html = `
    <div class="detail-header">
      <div class="detail-title" style="margin-bottom:6px">${esc(productName)}</div>
      <div class="detail-sub">
        ${countryListHtml ? `<span>${countryListHtml}</span>` : ''}
        ${mfrs.length ? `<span>${esc(mfrs.join(', '))}</span>` : ''}
        <span>${records.length} model${records.length>1?'s':''}</span>
      </div>
    </div>
    <div class="model-list">
  `;

  let groupSeq = 0;
  records.forEach(r => {
    const name = g(r, F.model);
    const yr = g(r, F.releaseYear);
    const mfr = g(r, F.manufacturer);
    const tp = sel(r.fields?.[F.type]);
    const imgs = r.fields?.[F.image];
    // Use 'large' thumbnail (~1024px max) instead of 'small' (~36px max) because
    // the model-row thumb is now rendered at 112x84 CSS px (= 224x168 on Retina),
    // which makes the 36px small thumb 3-6x stretched and blurry.
    const thumbSrc = imgs && imgs.length ? (imgs[0].thumbnails?.large?.url || imgs[0].url) : '';
    const isOverview = !!r.fields?.[F.familyOverview];
    // Intra-group sequential numbering: count only real model rows, not overview rows.
    const seqLabel = isOverview ? '' : String(++groupSeq);
    const overviewThumb = `<div class="model-thumb-overview" title="Family Overview"><svg viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect class="ovw-back"  x="22" y="20" width="44" height="34" rx="3"/><rect class="ovw-mid"   x="14" y="14" width="44" height="34" rx="3"/><rect class="ovw-front" x="6"  y="8"  width="44" height="34" rx="3"/></svg></div>`;
    html += `
      <div class="model-row${isOverview ? ' model-row-overview' : ''}" onclick="location.hash='#model/${r.id}'">
        <div class="model-so">${seqLabel}</div>
        ${thumbSrc ? `<img class="model-thumb" src="${thumbSrc}" alt="" loading="lazy">` : isOverview ? overviewThumb : '<div class="model-thumb-empty"><svg viewBox="0 0 48 36" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"><path d="M8 30 Q8 10 24 8 Q40 10 40 30" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".35"/><circle cx="24" cy="26" r="2" fill="currentColor" opacity=".3"/><line x1="24" y1="18" x2="24" y2="24" stroke="currentColor" stroke-width="1" opacity=".2"/></svg></div>'}
        <div class="model-name-block">
          <div class="model-name">${esc(name)}${isOverview ? '<span class="overview-badge">FAMILY OVERVIEW</span>' : ''}</div>
          <div class="model-mfr">${esc(mfr ? mfr.split('\n')[0] : '')} ${tp ? '· '+esc(tp) : ''}</div>
        </div>
        <div class="model-year">${esc(yr ? String(yr).substring(0,30) : '')}</div>
      </div>
    `;
  });
  html += '</div>';
  $app.innerHTML = html;
}

// ── Level 2: Model Detail ──
async function renderModel(recId) {
  const rec = allRecords.find(r => r.id === recId);
  if (!rec) { $app.innerHTML = '<p>Model not found.</p>'; return; }
  const f = rec.fields || {};
  const productName = f[F.productName] || f[F.model] || '';
  const modelName = f[F.model] || '';

  setBreadcrumb([
    { label: 'Archive', hash: '#' },
    { label: productName, hash: `#product/${encodeURIComponent(productName)}` },
    { label: modelName, hash: `#model/${recId}` },
  ]);

  // Helper
  function fmtSections(text) {
    if (!text) return '';
    return esc(String(text))
      .replace(/\[([^\]]+)\]/g, '<span class="section-label">[$1]</span>');
  }
  function imgCaption(filename) {
    if (!filename) return '';
    const name = filename.replace(/\.[^.]+$/, '');
    if (/^(image|IMG_|DSC|photo|screenshot|upload)/i.test(name)) return '';
    return esc(name);
  }
  const row = (label, val) => val ? `<div class="spec-row"><div class="spec-label">${label}</div><div class="spec-value">${esc(String(val))}</div></div>` : '';
  const rowSel = (label, val) => { const s = multiSel(val); return s ? row(label, s) : ''; };
  // Section helper: omits the entire section (header + body) if no rows have content.
  // This keeps Overview / aggregator records and any sparse record from showing empty
  // STIMULUS / BACKGROUND / FIXATION boxes.
  const sec = (title, rows, opts) => {
    const body = rows.filter(Boolean).join('');
    if (!body) return '';
    const collapsed = opts && opts.collapsed;
    const headCls = collapsed ? '' : ' open';
    const bodyCls = collapsed ? ' collapsed' : '';
    return `<div class="detail-section"><div class="section-head${headCls}" onclick="toggleSection(this)">${title} <span class="chevron">▾</span></div><div class="section-body${bodyCls}">${body}</div></div>`;
  };

  // Strategies formatted
  // Highlight ANY bracketed section header ([Abbreviations], [Strategy specifications — per 1985 Manual],
  // [Pattern-strategy applicability], [Model 605 limitations vs. Models 610/620], etc.)
  // — matches fmtSections helper behavior used elsewhere. Also consumes a single trailing
  // blank line after the header (avoids excessive spacing under white-space: pre-wrap).
  // Additionally, collapse blank lines WITHIN a section body (while preserving the blank
  // line BEFORE a section header) so lists authored with paragraph-style spacing — e.g.
  // HFA II-i series (720i/740i/745i/750i) which separates each Strategy entry with an
  // empty line — render as tightly as records authored in the one-strategy-per-line style
  // (e.g. HFA II Model 720). Section-boundary blank lines stay because they carry real
  // structural meaning.
  let stratHtml = '';
  const strat = f[F.strategies];
  if (strat) {
    stratHtml = esc(strat)
      // Collapse runs of 2+ newlines to a single newline, unless the next
      // non-whitespace character is '[' (start of a section header).
      .replace(/\n{2,}(?![ \t]*\[)/g, '\n')
      // Header followed by mandatory newline + optional blank line → header + single newline
      .replace(/\[([^\]\n]+)\]\n(\n[ \t]*)?/g, '<span class="section-label">[$1]</span>\n')
      // Catch remaining bare headers (end of text, no trailing newline)
      .replace(/\[([^\]\n]+)\]/g, '<span class="section-label">[$1]</span>');
  }

  // References formatted
  const refs = f[F.references] || '';

  // Images
  const images = f[F.image] || [];
  // Stash gallery items for the lightbox (latest renderModel call wins).
  // Each item gets explicit width/height from Airtable attachment metadata
  // so PhotoSwipe can do the smooth zoom-from-thumbnail animation.
  window._currentGallery = images.map(img => ({
    src: img.url,
    msrc: (img.thumbnails && img.thumbnails.large && img.thumbnails.large.url) || img.url,
    width: img.width || 0,
    height: img.height || 0,
    alt: imgCaption(img.filename) || modelName
  }));

  // Fetch PF records
  const pfPromise = fetchPFForModel(recId);

  let html = `
    <div class="detail-header">
      <div class="detail-title">${esc(modelName)}</div>
      <div class="detail-sub">
        <span>${esc(productName)}</span>
        <span>${esc(f[F.releaseYear] || '')}</span>
        <span>${esc(countryName(rec))}</span>
      </div>
    </div>
    ${images.length ? `
    <div class="detail-section" style="margin-bottom:20px">
      <div class="section-head open" onclick="toggleSection(this)">PHOTOS (${images.length}) <span class="chevron">▾</span></div>
      <div class="section-body">
        <div class="image-gallery">
          ${images.map((img, idx) => { const cap = imgCaption(img.filename); const thumb = (img.thumbnails && img.thumbnails.large && img.thumbnails.large.url) || img.url; return `<figure><a href="${img.url}" onclick="event.preventDefault();openLightbox(window._currentGallery,${idx});return false;"><img src="${thumb}" alt="${cap || esc(modelName)}"></a>${cap ? `<figcaption>${cap}</figcaption>` : ''}</figure>`; }).join('')}
        </div>
      </div>
    </div>` : (f[F.familyOverview] ? `
    <div class="overview-banner">
      <svg class="overview-banner-icon" viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- 3 stacked perimeter device silhouettes (back to front) -->
        <rect class="ovw-back"  x="22" y="20" width="44" height="34" rx="3"/>
        <rect class="ovw-mid"   x="14" y="14" width="44" height="34" rx="3"/>
        <rect class="ovw-front" x="6"  y="8"  width="44" height="34" rx="3"/>
        <!-- screen highlight on front device -->
        <rect class="ovw-screen" x="10" y="12" width="36" height="20" rx="2"/>
        <!-- 3 fixation dots representing the data center -->

    // structural descriptions. Full text still shows on the Pattern Detail.
    const shortCount = raw => {
      const m = String(raw || '').match(/^\s*(\d+)/);
      return m ? m[1] : '';
    };
    let pgHtml = '<div class="pattern-grid">';
    pfRecords.forEach(pf => {
